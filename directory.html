<!DOCTYPE html>
<html lang="en" data-theme="copper" data-mode="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TPT Oracle Scripts Directory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;500;600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Fira+Code:wght@400;500&family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-mono/style.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-light" disabled>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css" id="hljs-dark" disabled>
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
* { margin: 0; padding: 0; box-sizing: border-box; }

/* ============================================================
   CSS CUSTOM PROPERTIES PER THEME / MODE
   ============================================================ */

/* ---------- BRUTALIST light (default) ---------- */
[data-theme="brutalist"] {
  --bg: #ffffff;
  --surface: #ffffff;
  --surface2: #ffffff;
  --border: #000000;
  --border-light: #000000;
  --text: #000000;
  --text2: #000000;
  --accent: #ff0000;
  --accent-bright: #ff0000;
  --accent-muted: transparent;
  --accent-glow: transparent;
  --green: #ff0000;
  --green-bg: transparent;
  --orange: #000000;
  --red: #000000;
  --highlight: transparent;
  --hover: #000000;
  --hover-text: #ffffff;
  --radius: 0px;
  --radius-lg: 0px;
  --radius-pill: 0px;
  --border-width: 2px;
  --transition: 0s;
  --font-heading: 'JetBrains Mono', monospace;
  --font-body: 'JetBrains Mono', monospace;
  --font-mono: 'JetBrains Mono', monospace;
  --sidebar-bg: #000000;
  --sidebar-text: #ffffff;
  --sidebar-active: #ff0000;
  --sidebar-active-bg: transparent;
  --sidebar-border: #ffffff;
  --header-bg: #000000;
  --header-text: #ffffff;
  --card-bg: #ffffff;
  --card-border: #000000;
  --code-bg: #000000;
  --code-text: #ffffff;
  --code-border: #ffffff;
  --overlay-bg: #000000;
  --backdrop: none;
  --shadow: none;
  --shadow-hover: none;
}

[data-theme="brutalist"][data-mode="dark"] {
  --bg: #000000;
  --surface: #000000;
  --surface2: #000000;
  --border: #ffffff;
  --border-light: #ffffff;
  --text: #ffffff;
  --text2: #ffffff;
  --accent: #ff0000;
  --accent-bright: #ff0000;
  --hover: #ffffff;
  --hover-text: #000000;
  --sidebar-bg: #ffffff;
  --sidebar-text: #000000;
  --sidebar-active: #ff0000;
  --sidebar-border: #000000;
  --header-bg: #ffffff;
  --header-text: #000000;
  --card-bg: #000000;
  --card-border: #ffffff;
  --code-bg: #000000;
  --code-text: #ffffff;
  --code-border: #ffffff;
  --overlay-bg: #000000;
}

/* ---------- COPPER dark (default) ---------- */
[data-theme="copper"] {
  --bg: #17151a;
  --surface: #1e1c22;
  --surface2: #26232b;
  --border: #2d2a33;
  --border-light: #2d2a33;
  --text: #ede8e3;
  --text2: #8a8390;
  --accent: #c87941;
  --accent-bright: #e09458;
  --accent-muted: #c8794122;
  --accent-glow: #c8794133;
  --green: #7eb37e;
  --green-bg: #7eb37e18;
  --orange: #d4915e;
  --red: #c45c5c;
  --highlight: #c8794133;
  --hover: #26232b;
  --hover-text: #ede8e3;
  --radius: 8px;
  --radius-lg: 12px;
  --radius-pill: 24px;
  --border-width: 1px;
  --transition: 0.2s;
  --font-heading: 'Outfit', sans-serif;
  --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'Fira Code', monospace;
  --sidebar-bg: transparent;
  --sidebar-text: #8a8390;
  --sidebar-active: #e09458;
  --sidebar-active-bg: #c8794122;
  --sidebar-border: #2d2a33;
  --header-bg: #17151a;
  --header-text: #ede8e3;
  --card-bg: #1e1c22;
  --card-border: #2d2a33;
  --code-bg: #17151a;
  --code-text: #ede8e3;
  --code-border: #2d2a33;
  --overlay-bg: rgba(10,9,12,0.75);
  --backdrop: blur(8px);
  --shadow: 0 2px 8px rgba(0,0,0,0.2);
  --shadow-hover: 0 0 0 1px rgba(200,121,65,0.2), 0 4px 20px rgba(0,0,0,0.2);
}

[data-theme="copper"][data-mode="light"] {
  --bg: #faf8f5;
  --surface: #ffffff;
  --surface2: #f5f0eb;
  --border: #e8e0d8;
  --border-light: #e8e0d8;
  --text: #2c2418;
  --text2: #8a7e70;
  --accent: #c87941;
  --accent-bright: #b06830;
  --accent-muted: #c8794118;
  --accent-glow: #c8794122;
  --green: #6a9a6a;
  --green-bg: #6a9a6a15;
  --orange: #c07840;
  --red: #b54e4e;
  --highlight: #c8794120;
  --hover: #f5f0eb;
  --hover-text: #2c2418;
  --sidebar-bg: #f2ede7;
  --sidebar-text: #8a7e70;
  --sidebar-active: #c87941;
  --sidebar-active-bg: #c8794115;
  --sidebar-border: #e8e0d8;
  --header-bg: #faf8f5;
  --header-text: #2c2418;
  --card-bg: #ffffff;
  --card-border: #e8e0d8;
  --code-bg: #faf8f5;
  --code-text: #2c2418;
  --code-border: #e8e0d8;
  --overlay-bg: rgba(250,248,245,0.8);
  --backdrop: blur(8px);
  --shadow: 0 1px 4px rgba(0,0,0,0.06);
  --shadow-hover: 0 4px 16px rgba(200,121,65,0.1);
}

/* ---------- DAYLIGHT light (default) ---------- */
[data-theme="daylight"] {
  --bg: #ffffff;
  --surface: #fafafa;
  --surface2: #f5f5f5;
  --border: #e5e5e5;
  --border-light: #f0f0f0;
  --text: #111111;
  --text2: #666666;
  --accent: #4338ca;
  --accent-bright: #4338ca;
  --accent-muted: #4338ca15;
  --accent-glow: #4338ca20;
  --green: #16a34a;
  --green-bg: #f0fdf4;
  --orange: #d97706;
  --red: #dc2626;
  --highlight: #fef08a;
  --hover: #f8f8f8;
  --hover-text: #111111;
  --radius: 6px;
  --radius-lg: 12px;
  --radius-pill: 99px;
  --border-width: 1px;
  --transition: 0.1s;
  --font-heading: 'Bricolage Grotesque', sans-serif;
  --font-body: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'Geist Mono', 'SF Mono', 'Consolas', monospace;
  --sidebar-bg: transparent;
  --sidebar-text: #666666;
  --sidebar-active: #4338ca;
  --sidebar-active-bg: #eef2ff;
  --sidebar-border: transparent;
  --header-bg: rgba(255,255,255,0.92);
  --header-text: #111111;
  --card-bg: transparent;
  --card-border: #f0f0f0;
  --code-bg: #fafafa;
  --code-text: #111111;
  --code-border: #e5e5e5;
  --overlay-bg: rgba(0,0,0,0.15);
  --backdrop: blur(2px);
  --shadow: none;
  --shadow-hover: none;
}

[data-theme="daylight"][data-mode="dark"] {
  --bg: #111111;
  --surface: #1a1a1a;
  --surface2: #222222;
  --border: #2a2a2a;
  --border-light: #222222;
  --text: #e5e5e5;
  --text2: #888888;
  --accent: #6366f1;
  --accent-bright: #6366f1;
  --accent-muted: #6366f115;
  --accent-glow: #6366f120;
  --green: #4ade80;
  --green-bg: #4ade8015;
  --orange: #fbbf24;
  --red: #f87171;
  --highlight: #854d0e40;
  --hover: #1f1f1f;
  --hover-text: #e5e5e5;
  --sidebar-bg: transparent;
  --sidebar-text: #888888;
  --sidebar-active: #6366f1;
  --sidebar-active-bg: #1e1b4b;
  --sidebar-border: transparent;
  --header-bg: rgba(17,17,17,0.92);
  --header-text: #e5e5e5;
  --card-bg: transparent;
  --card-border: #222222;
  --code-bg: #1a1a1a;
  --code-text: #e5e5e5;
  --code-border: #2a2a2a;
  --overlay-bg: rgba(0,0,0,0.5);
  --backdrop: blur(4px);
  --shadow: none;
  --shadow-hover: none;
}

/* ============================================================
   BODY
   ============================================================ */
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background var(--transition), color var(--transition);
}

::selection {
  background: var(--accent);
  color: #ffffff;
}
[data-theme="brutalist"] ::selection {
  background: #ff0000;
  color: #ffffff;
}

/* ============================================================
   HEADER
   ============================================================ */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--header-bg);
  border-bottom: var(--border-width) solid var(--border);
  padding: 24px 32px 20px;
  transition: background var(--transition), border-color var(--transition);
  overflow: hidden;
}

/* Copper diagonal lines */
[data-theme="copper"] .header::before {
  content: '';
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(
    -45deg,
    transparent,
    transparent 14px,
    rgba(200,121,65,0.03) 14px,
    rgba(200,121,65,0.03) 15px
  );
  pointer-events: none;
}

/* Daylight glassmorphism */
[data-theme="daylight"] .header {
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

/* Brutalist header: solid bar */
[data-theme="brutalist"] .header {
  background: var(--header-bg);
  color: var(--header-text);
  padding: 10px 20px;
}

.header-top {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 16px;
  position: relative;
}

[data-theme="brutalist"] .header-top {
  margin-bottom: 0;
}

.header h1 {
  font-family: var(--font-heading);
  font-size: 24px;
  font-weight: 300;
  color: var(--header-text);
  letter-spacing: -0.3px;
  transition: color var(--transition);
}

[data-theme="brutalist"] .header h1 {
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.15em;
}

[data-theme="daylight"] .header h1 {
  font-size: 28px;
  font-weight: 500;
  letter-spacing: -0.02em;
  color: var(--text);
}

.header h1 strong {
  font-weight: 500;
  color: var(--accent);
}
[data-theme="brutalist"] .header h1 strong {
  font-weight: 700;
  color: var(--header-text);
}
[data-theme="daylight"] .header h1 strong {
  font-weight: 500;
  color: var(--text);
}

.header h1 span {
  font-weight: 300;
  color: var(--text2);
  margin-left: 2px;
}
[data-theme="brutalist"] .header h1 span {
  color: var(--header-text);
  opacity: 0.6;
}

.header-subtitle {
  font-size: 14px;
  color: var(--text2);
  margin-top: 2px;
  display: none;
}
[data-theme="daylight"] .header-subtitle {
  display: block;
}

.header-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  position: relative;
  z-index: 2;
}

/* Watermark for daylight */
.header-watermark {
  display: none;
}
[data-theme="daylight"] .header-watermark {
  display: block;
  position: absolute;
  right: 0;
  top: -8px;
  font-family: var(--font-heading);
  font-size: 72px;
  font-weight: 700;
  line-height: 1;
  pointer-events: none;
  user-select: none;
  z-index: 0;
}
[data-theme="daylight"][data-mode="light"] .header-watermark { color: #f5f5f5; }
[data-theme="daylight"][data-mode="dark"] .header-watermark { color: #1a1a1a; }

/* ---- Theme Picker ---- */
.theme-picker {
  display: flex;
  gap: 4px;
}
.theme-picker button {
  width: 28px;
  height: 28px;
  border: var(--border-width) solid var(--border);
  background: transparent;
  color: var(--text2);
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border-radius: var(--radius);
  transition: all var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
}
.theme-picker button:hover {
  color: var(--text);
  border-color: var(--text);
}
.theme-picker button.active {
  background: var(--accent);
  color: #ffffff;
  border-color: var(--accent);
}

/* Brutalist picker overrides */
[data-theme="brutalist"] .theme-picker button {
  border-radius: 0;
  border-color: var(--header-text);
  color: var(--header-text);
  background: transparent;
}
[data-theme="brutalist"] .theme-picker button:hover {
  background: var(--header-text);
  color: var(--header-bg);
}
[data-theme="brutalist"] .theme-picker button.active {
  background: #ff0000;
  color: #ffffff;
  border-color: #ff0000;
}

/* ---- Mode Toggle ---- */
.mode-toggle {
  width: 28px;
  height: 28px;
  border: var(--border-width) solid var(--border);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  border-radius: var(--radius);
  transition: all var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}
.mode-toggle:hover {
  color: var(--text);
  border-color: var(--text);
}
.mode-toggle svg {
  width: 16px;
  height: 16px;
}

[data-theme="brutalist"] .mode-toggle {
  border-radius: 0;
  border-color: var(--header-text);
  color: var(--header-text);
}
[data-theme="brutalist"] .mode-toggle:hover {
  background: var(--header-text);
  color: var(--header-bg);
}

/* ---- Stats ---- */
.stats {
  font-size: 13px;
  color: var(--text2);
  font-weight: 400;
  position: relative;
  white-space: nowrap;
}
.stats b { color: var(--accent); font-weight: 500; }

[data-theme="brutalist"] .stats {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--header-text);
}
[data-theme="brutalist"] .stats b { color: var(--header-text); }

/* ============================================================
   SEARCH
   ============================================================ */
.search-wrap {
  position: relative;
}
[data-theme="brutalist"] .search-wrap {
  border-bottom: var(--border-width) solid var(--border);
  border-top: var(--border-width) solid var(--border);
}

.search-wrap svg {
  position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
  width: 18px; height: 18px; color: var(--text2);
  transition: color var(--transition);
}
[data-theme="brutalist"] .search-wrap svg { display: none; }

#search {
  width: 100%;
  padding: 14px 20px 14px 50px;
  background: var(--surface);
  border: var(--border-width) solid var(--border);
  border-radius: var(--radius-pill);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  outline: none;
  transition: all var(--transition);
}
#search::placeholder { color: var(--text2); opacity: 0.7; }
#search:focus {
  border-color: var(--accent);
}

/* Copper: glow on focus */
[data-theme="copper"] #search:focus {
  box-shadow: 0 0 0 3px var(--accent-muted), 0 0 20px rgba(200,121,65,0.1);
}
[data-theme="copper"] .search-wrap:focus-within svg { color: var(--accent); }

/* Brutalist: flat */
[data-theme="brutalist"] #search {
  border-radius: 0;
  padding: 10px 20px;
  border: none;
  background: var(--bg);
  caret-color: #ff0000;
  font-size: 13px;
}

/* Daylight: subtle */
[data-theme="daylight"] #search {
  border-radius: 8px;
  padding: 12px 16px 12px 44px;
  background: var(--bg);
}
[data-theme="daylight"] .search-wrap svg { left: 16px; opacity: 0.5; }

.search-hint {
  margin-top: 10px;
  font-size: 12px;
  color: var(--text2);
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  padding-left: 4px;
  position: relative;
}
[data-theme="brutalist"] .search-hint {
  padding: 4px 20px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  border-bottom: var(--border-width) solid var(--border);
  margin-top: 0;
  background: var(--bg);
}
[data-theme="daylight"] .search-hint { opacity: 0.7; }

.search-hint kbd {
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 1px 7px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent);
}
[data-theme="brutalist"] .search-hint kbd {
  border: 2px solid var(--text);
  border-radius: 0;
  background: transparent;
  color: var(--text);
}

/* ============================================================
   LAYOUT
   ============================================================ */
.layout {
  display: flex;
  min-height: calc(100vh - 140px);
}
[data-theme="daylight"] .layout {
  max-width: 1200px;
  margin: 0 auto;
}

/* ============================================================
   SIDEBAR
   ============================================================ */
.sidebar {
  width: 260px;
  min-width: 260px;
  border-right: var(--border-width) solid var(--border);
  padding: 20px 0;
  overflow-y: auto;
  position: sticky;
  top: 130px;
  max-height: calc(100vh - 130px);
  background: var(--sidebar-bg);
  transition: background var(--transition), border-color var(--transition);
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

[data-theme="brutalist"] .sidebar {
  width: 240px;
  min-width: 240px;
  top: 68px;
  max-height: calc(100vh - 68px);
  padding: 0;
}

[data-theme="daylight"] .sidebar {
  width: 220px;
  min-width: 220px;
  border-right: none;
  padding: 24px 0 24px 32px;
  top: 160px;
  max-height: calc(100vh - 160px);
}

[data-theme="copper"][data-mode="light"] .sidebar {
  background: var(--sidebar-bg);
}

.sidebar h3 {
  font-family: var(--font-heading);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text2);
  padding: 0 20px;
  margin-bottom: 12px;
  font-weight: 500;
}
[data-theme="brutalist"] .sidebar h3 {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.15em;
  padding: 12px 14px 8px;
  border-bottom: 2px solid var(--sidebar-border);
  color: var(--sidebar-text);
  margin-bottom: 0;
}

/* Category items */
.cat-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  cursor: pointer;
  font-size: 13px;
  color: var(--sidebar-text);
  transition: all var(--transition);
  border-left: 2px solid transparent;
  margin: 1px 0;
}
.cat-item:hover {
  background: var(--surface);
  color: var(--text);
}
.cat-item.active {
  background: var(--sidebar-active-bg);
  color: var(--sidebar-active);
  border-left-color: var(--accent);
  font-weight: 500;
}

[data-theme="brutalist"] .cat-item {
  padding: 5px 14px;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--sidebar-text);
  border-bottom: 1px solid var(--sidebar-border);
  border-left: none;
  margin: 0;
}
[data-theme="brutalist"] .cat-item:hover {
  background: var(--sidebar-text);
  color: var(--sidebar-bg);
}
[data-theme="brutalist"] .cat-item.active {
  color: #ff0000;
  background: transparent;
  border-left: none;
}
[data-theme="brutalist"] .cat-item.active:hover {
  background: var(--sidebar-text);
  color: #ff0000;
}

[data-theme="daylight"] .cat-item {
  display: block;
  padding: 5px 12px;
  margin-left: -12px;
  border-left: 2px solid transparent;
  line-height: 1.5;
  justify-content: flex-start;
}
[data-theme="daylight"] .cat-item:hover { color: var(--text); background: transparent; }
[data-theme="daylight"] .cat-item.active {
  color: var(--accent);
  border-left-color: var(--accent);
  background: transparent;
}

.cat-count {
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 0px 8px;
  font-size: 11px;
  min-width: 28px;
  text-align: center;
  font-family: var(--font-mono);
  line-height: 1.7;
  transition: all var(--transition);
}
.cat-item.active .cat-count {
  border-color: var(--accent);
  color: var(--accent);
}
[data-theme="brutalist"] .cat-count {
  border: none;
  border-radius: 0;
  padding: 0;
  min-width: auto;
}
[data-theme="daylight"] .cat-count {
  display: none;
}
[data-theme="daylight"] .cat-tooltip {
  display: none;
  position: absolute;
  left: calc(100% + 8px);
  top: 50%;
  transform: translateY(-50%);
  background: var(--text);
  color: var(--bg);
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  white-space: nowrap;
  pointer-events: none;
  z-index: 10;
}
[data-theme="daylight"] .cat-item { position: relative; }
[data-theme="daylight"] .cat-item:hover .cat-tooltip { display: block; }

/* ============================================================
   MAIN CONTENT
   ============================================================ */
.main {
  flex: 1;
  padding: 20px 28px;
  overflow-y: auto;
  transition: background var(--transition);
}
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }

[data-theme="brutalist"] .main {
  padding: 0;
  max-height: calc(100vh - 68px);
}
[data-theme="daylight"] .main {
  padding: 24px 32px 48px 40px;
}

/* Results header */
.results-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 8px;
}
[data-theme="brutalist"] .results-header {
  padding: 8px 20px;
  border-bottom: var(--border-width) solid var(--border);
  margin-bottom: 0;
}
[data-theme="daylight"] .results-header { margin-bottom: 8px; }

.results-count {
  font-size: 13px;
  color: var(--text2);
}
[data-theme="brutalist"] .results-count {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* Sort buttons */
.sort-btns { display: flex; gap: 4px; }
.sort-btn {
  background: transparent;
  border: var(--border-width) solid var(--border);
  color: var(--text2);
  padding: 5px 14px;
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-size: 12px;
  cursor: pointer;
  transition: all var(--transition);
}
.sort-btn:hover { color: var(--text); border-color: var(--text2); }
.sort-btn.active {
  background: var(--accent);
  color: #ffffff;
  border-color: var(--accent);
  font-weight: 500;
}

[data-theme="brutalist"] .sort-btns { gap: 0; }
[data-theme="brutalist"] .sort-btn {
  border-radius: 0;
  padding: 3px 10px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-left: -2px;
  border-color: var(--text);
}
[data-theme="brutalist"] .sort-btn:first-child { margin-left: 0; }
[data-theme="brutalist"] .sort-btn:hover {
  background: var(--text);
  color: var(--bg);
}
[data-theme="brutalist"] .sort-btn.active {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
}

[data-theme="daylight"] .sort-btns { gap: 0; }
[data-theme="daylight"] .sort-btn {
  border: none;
  border-bottom: 2px solid transparent;
  border-radius: 0;
  padding: 4px 12px;
  font-size: 13px;
  background: none;
}
[data-theme="daylight"] .sort-btn:hover { color: var(--text); }
[data-theme="daylight"] .sort-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  background: none;
}

/* ============================================================
   CARDS -- Standard (Copper + Daylight)
   ============================================================ */
.card {
  background: var(--card-bg);
  border: var(--border-width) solid var(--card-border);
  border-left: 2px solid transparent;
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
}
.card:hover {
  border-left-color: var(--accent);
  box-shadow: var(--shadow-hover);
}
.card.expanded {
  border-left-color: var(--accent);
  background: var(--surface2);
}
.card-top {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.card-name {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 500;
  color: var(--accent-bright);
  flex-shrink: 0;
  transition: color var(--transition);
}
.card-purpose {
  font-size: 13px;
  color: var(--text2);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-width: 0;
}
.card.expanded .card-purpose { white-space: normal; }
.card-badges {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
  align-items: center;
}
.badge {
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  white-space: nowrap;
  font-family: var(--font-body);
}
.badge.cat { border-color: var(--accent-muted); color: var(--accent); }
.badge.doc { border-color: var(--green-bg); color: var(--green); }
.badge.dir { border-color: rgba(212,145,94,0.2); color: var(--orange); }

/* Daylight card overrides */
[data-theme="daylight"] .card {
  padding: 20px 0;
  border: none;
  border-bottom: 1px solid var(--border-light);
  border-radius: 6px;
  margin: 0 -16px;
  padding-left: 16px;
  padding-right: 16px;
  border-left: none;
}
[data-theme="daylight"] .card:hover {
  background: var(--hover);
  box-shadow: none;
  border-left: none;
}
[data-theme="daylight"] .card.expanded {
  background: var(--hover);
  border-left: none;
}
[data-theme="daylight"] .card:last-child { border-bottom: none; }
[data-theme="daylight"] .card-top { align-items: baseline; }
[data-theme="daylight"] .card-name { color: var(--text); font-weight: 600; letter-spacing: -0.01em; }
[data-theme="daylight"] .card-purpose { font-size: 14px; }
[data-theme="daylight"] .badge {
  border: none;
  border-radius: 99px;
  padding: 1px 8px;
  font-weight: 500;
}
[data-theme="daylight"] .badge.cat { background: var(--accent-muted); color: var(--accent); border: none; }
[data-theme="daylight"] .badge.doc { background: var(--green-bg); color: var(--green); border: none; }
[data-theme="daylight"] .badge.dir { background: #fffbeb; color: var(--orange); border: none; }
[data-theme="daylight"][data-mode="dark"] .badge.dir { background: #fbbf2415; }

/* Relevance dots */
.relevance-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px;
}
.relevance-high { background: var(--green); }
.relevance-medium { background: var(--orange); }
.relevance-low { background: var(--red); }
[data-theme="daylight"] .relevance-dot { width: 6px; height: 6px; position: relative; top: -1px; }

/* ============================================================
   CARDS -- Brutalist rows
   ============================================================ */
.row {
  display: flex;
  align-items: stretch;
  border-bottom: 2px solid var(--border);
  cursor: pointer;
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  transition: none;
}
.row:hover {
  background: var(--hover);
  color: var(--hover-text);
}
.row.expanded { border-bottom: none; }
.row-file {
  width: 200px;
  min-width: 200px;
  padding: 6px 12px;
  border-right: 2px solid var(--border);
  font-weight: 700;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.row-purpose {
  flex: 1;
  padding: 6px 12px;
  border-right: 2px solid var(--border);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.row-cat {
  width: 180px;
  min-width: 180px;
  padding: 6px 12px;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border-right: 2px solid var(--border);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.row-doc {
  width: 40px;
  min-width: 40px;
  padding: 6px 8px;
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  color: #ff0000;
}
.row:hover .row-file,
.row:hover .row-purpose,
.row:hover .row-cat {
  border-right-color: var(--hover-text);
}
.row.expanded .row-file,
.row.expanded .row-purpose,
.row.expanded .row-cat {
  border-right-color: var(--border);
}

/* Row details (brutalist expanded) */
.row-details {
  display: none;
  padding: 12px 20px;
  border-bottom: 2px solid var(--border);
  border-top: 4px solid var(--border);
  background: var(--bg);
}
.row-details.open { display: block; }
.detail-line {
  margin-bottom: 6px;
  display: flex;
  gap: 10px;
}
.detail-line .detail-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  min-width: 90px;
  flex-shrink: 0;
}
.detail-line .detail-val {
  font-size: 12px;
  white-space: pre-wrap;
  word-break: break-word;
}
.kw-list {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.kw-tag-brutalist {
  font-size: 11px;
  border: 2px solid var(--text);
  padding: 0 6px;
  text-transform: uppercase;
}
.view-src-brutalist {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  text-decoration: underline;
  cursor: pointer;
  background: none;
  border: none;
  font-family: var(--font-mono);
  padding: 0;
  margin-top: 8px;
  color: var(--text);
  letter-spacing: 0.05em;
}
.view-src-brutalist:hover {
  background: var(--text);
  color: var(--bg);
}

/* ============================================================
   EXPANDED DETAILS (Copper + Daylight)
   ============================================================ */
.card-details {
  display: none;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}
.card.expanded .card-details { display: block; }
.detail-row {
  display: flex;
  gap: 14px;
  margin-bottom: 10px;
  font-size: 13px;
}
.detail-label {
  color: var(--text2);
  min-width: 85px;
  flex-shrink: 0;
  font-weight: 500;
  text-transform: uppercase;
  font-family: var(--font-heading);
  font-size: 10px;
  letter-spacing: 0.8px;
  padding-top: 3px;
}
.detail-val {
  color: var(--text);
  white-space: pre-wrap;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.7;
}
.keywords-list { display: flex; flex-wrap: wrap; gap: 5px; }
.kw-tag {
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text2);
  font-family: var(--font-body);
  transition: all var(--transition);
}

[data-theme="daylight"] .detail-label {
  font-family: var(--font-body);
  min-width: 72px;
  font-size: 11px;
  letter-spacing: 0.04em;
  padding-top: 2px;
}

/* ============================================================
   HIGHLIGHT (mark)
   ============================================================ */
mark {
  background: var(--highlight);
  color: var(--accent-bright);
  border-radius: 2px;
  padding: 0 2px;
}
[data-theme="brutalist"] mark {
  background: none;
  color: #ff0000;
  font-weight: 700;
  padding: 0;
  border-radius: 0;
}
[data-theme="daylight"] mark {
  background: var(--highlight);
  color: inherit;
}

/* ============================================================
   VIEW SOURCE BUTTON (Copper + Daylight)
   ============================================================ */
.view-src-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  color: var(--accent);
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  padding: 7px 16px;
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  margin-top: 12px;
  transition: all var(--transition);
}
.view-src-btn:hover {
  background: var(--accent);
  color: #ffffff;
}
.view-src-btn svg { width: 14px; height: 14px; }

[data-theme="daylight"] .view-src-btn {
  border: none;
  padding: 6px 0;
  border-radius: 0;
}
[data-theme="daylight"] .view-src-btn:hover {
  background: none;
  color: var(--accent);
  opacity: 0.7;
}
[data-theme="daylight"] .view-src-btn .arrow { transition: transform 0.1s; }
[data-theme="daylight"] .view-src-btn:hover .arrow { transform: translateX(2px); }

/* ============================================================
   EMPTY STATE
   ============================================================ */
.empty {
  text-align: center;
  padding: 80px 20px;
  color: var(--text2);
}
.empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.2;
  color: var(--accent);
}
.empty h3 {
  margin-bottom: 8px;
  color: var(--text);
  font-family: var(--font-heading);
  font-weight: 400;
}
[data-theme="brutalist"] .empty {
  padding: 60px 20px;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
[data-theme="daylight"] .empty h3 {
  font-size: 18px;
  font-weight: 500;
}
[data-theme="daylight"] .empty p { font-size: 14px; }

/* ============================================================
   MOBILE CATEGORIES
   ============================================================ */
.mobile-cats {
  display: none;
  padding: 8px 16px;
  overflow-x: auto;
  white-space: nowrap;
  border-bottom: var(--border-width) solid var(--border);
}
.mob-cat {
  display: inline-block;
  padding: 5px 14px;
  border-radius: var(--radius-pill);
  background: transparent;
  border: 1px solid var(--border);
  font-family: var(--font-body);
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  white-space: nowrap;
  transition: all var(--transition);
}
.mob-cat.active {
  background: var(--accent);
  color: #ffffff;
  border-color: var(--accent);
}
[data-theme="brutalist"] .mob-cat {
  border-radius: 0;
  border-width: 2px;
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 0.05em;
}

/* ============================================================
   SCROLL TO TOP
   ============================================================ */
.scroll-top {
  position: fixed;
  bottom: 28px;
  right: 28px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--accent);
  color: var(--bg);
  border: none;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  z-index: 200;
  transition: all 0.3s;
  opacity: 0;
  transform: translateY(10px);
}
.scroll-top.visible {
  display: flex;
  opacity: 1;
  transform: translateY(0);
}
.scroll-top:hover {
  transform: translateY(-2px);
}
.scroll-top svg { width: 18px; height: 18px; }

[data-theme="brutalist"] .scroll-top {
  border-radius: 0;
  background: var(--text);
  color: var(--bg);
  border: 2px solid var(--text);
  box-shadow: none;
  width: 36px;
  height: 36px;
  font-family: var(--font-mono);
}
[data-theme="brutalist"] .scroll-top:hover {
  background: var(--bg);
  color: var(--text);
  transform: none;
}
[data-theme="daylight"] .scroll-top {
  border-radius: 8px;
  background: var(--bg);
  color: var(--text2);
  border: 1px solid var(--border);
  box-shadow: none;
  width: 36px;
  height: 36px;
}
[data-theme="daylight"] .scroll-top:hover {
  color: var(--text);
  border-color: var(--text2);
  transform: none;
}

/* ============================================================
   CODE OVERLAY
   ============================================================ */
.code-overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: var(--overlay-bg);
  backdrop-filter: var(--backdrop);
  -webkit-backdrop-filter: var(--backdrop);
  display: none;
  align-items: stretch;
  justify-content: center;
  padding: 32px;
  opacity: 0;
  transition: opacity 0.2s;
}
.code-overlay.open {
  display: flex;
  opacity: 1;
}

[data-theme="brutalist"] .code-overlay {
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
  padding: 0;
}
[data-theme="daylight"] .code-overlay {
  align-items: center;
  padding: 40px;
}

.code-panel {
  background: var(--code-bg);
  border: var(--border-width) solid var(--code-border);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 1000px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 24px 80px rgba(0,0,0,0.4);
}
[data-theme="brutalist"] .code-panel {
  border-radius: 0;
  max-width: none;
  box-shadow: none;
  border: none;
}
[data-theme="daylight"] .code-panel {
  max-width: 880px;
  max-height: calc(100vh - 80px);
  box-shadow: 0 24px 80px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06);
}
[data-theme="copper"] .code-panel {
  box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(200,121,65,0.1);
}

.code-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  background: var(--surface);
  border-bottom: var(--border-width) solid var(--code-border);
  flex-shrink: 0;
}
[data-theme="brutalist"] .code-header {
  background: #000000;
  color: #ffffff;
  border-bottom-color: #ffffff;
  padding: 10px 20px;
}

.code-title {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 500;
  color: var(--accent-bright);
}
[data-theme="brutalist"] .code-title {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #ffffff;
}
[data-theme="daylight"] .code-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}

.code-header-actions {
  display: flex;
  gap: 10px;
  align-items: center;
}
.code-line-count {
  font-size: 12px;
  color: var(--text2);
  font-family: var(--font-mono);
}
[data-theme="brutalist"] .code-line-count {
  font-size: 11px;
  text-transform: uppercase;
  color: #ffffff;
}

.code-close-btn {
  background: var(--surface2);
  border: var(--border-width) solid var(--code-border);
  color: var(--text2);
  width: 32px;
  height: 32px;
  border-radius: var(--radius);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all var(--transition);
}
.code-close-btn:hover {
  color: var(--text);
  background: var(--border);
}
[data-theme="brutalist"] .code-close-btn {
  background: none;
  border: 2px solid #ffffff;
  color: #ffffff;
  border-radius: 0;
  width: 28px;
  height: 28px;
}
[data-theme="brutalist"] .code-close-btn:hover {
  background: #ffffff;
  color: #000000;
}

.code-copy-btn {
  background: transparent;
  border: var(--border-width) solid var(--code-border);
  color: var(--text2);
  padding: 5px 14px;
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-size: 12px;
  cursor: pointer;
  transition: all var(--transition);
}
.code-copy-btn:hover { color: var(--text); border-color: var(--text2); }
.code-copy-btn.copied {
  background: var(--green-bg);
  color: var(--green);
  border-color: var(--green);
}
[data-theme="brutalist"] .code-copy-btn {
  border: 2px solid #ffffff;
  color: #ffffff;
  border-radius: 0;
  font-size: 11px;
  text-transform: uppercase;
}
[data-theme="brutalist"] .code-copy-btn:hover {
  background: #ffffff;
  color: #000000;
}
[data-theme="brutalist"] .code-copy-btn.copied {
  border-color: #ff0000;
  color: #ff0000;
  background: transparent;
}

.code-body {
  flex: 1;
  overflow: auto;
  position: relative;
  background: var(--code-bg);
}
.code-body::-webkit-scrollbar { width: 6px; height: 6px; }
.code-body::-webkit-scrollbar-track { background: transparent; }
.code-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }

.code-body pre {
  margin: 0;
  padding: 0;
  background: transparent !important;
}
.code-body code {
  font-family: var(--font-mono) !important;
  font-size: 13px !important;
  line-height: 1.7 !important;
  padding: 20px 24px !important;
  background: transparent !important;
  tab-size: 4;
}

/* Line numbers */
.code-body .hljs-ln { border-collapse: collapse; }
.code-body .hljs-ln-numbers {
  color: var(--text2);
  opacity: 0.3;
  text-align: right;
  padding-right: 20px;
  user-select: none;
  min-width: 44px;
  vertical-align: top;
  font-size: 12px;
}
[data-theme="brutalist"] .code-body .hljs-ln-numbers {
  color: #ffffff;
  opacity: 0.3;
}

.code-loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 80px;
  color: var(--text2);
  font-size: 14px;
  gap: 12px;
  font-family: var(--font-body);
}
.code-loading .spinner {
  width: 20px;
  height: 20px;

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<script>
// ============================================================
// THEME + MODE MANAGEMENT
// ============================================================

const THEME_DEFAULTS = {
  brutalist: 'light',
  copper: 'dark',
  daylight: 'light'
};

let currentTheme = localStorage.getItem('tpt-theme') || 'copper';
let currentMode = localStorage.getItem('tpt-mode') || null;

// If no saved mode, use system preference
if (!currentMode) {
  currentMode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

function applyThemeMode() {
  document.documentElement.setAttribute('data-theme', currentTheme);
  document.documentElement.setAttribute('data-mode', currentMode);
  localStorage.setItem('tpt-theme', currentTheme);
  localStorage.setItem('tpt-mode', currentMode);

  // Update theme picker active state
  document.querySelectorAll('#theme-picker button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.pick === currentTheme);
  });

  // Update mode toggle icons
  const sunIcon = document.querySelector('.icon-sun');
  const moonIcon = document.querySelector('.icon-moon');
  if (currentMode === 'dark') {
    sunIcon.style.display = 'block';
    moonIcon.style.display = 'none';
  } else {
    sunIcon.style.display = 'none';
    moonIcon.style.display = 'block';
  }

  // Update highlight.js theme
  updateHljsTheme();

  // Update watermark
  const wm = document.getElementById('watermark');
  if (wm) {
    wm.textContent = typeof allScripts !== 'undefined' ? allScripts.length : '';
  }
}

function updateHljsTheme() {
  const lightLink = document.getElementById('hljs-light');
  const darkLink = document.getElementById('hljs-dark');

  // Brutalist always uses its own overrides (dark code viewer)
  if (currentTheme === 'brutalist') {
    lightLink.disabled = true;
    darkLink.disabled = true;
    return;
  }

  // Copper uses its own overrides too, but load a base
  if (currentTheme === 'copper') {
    if (currentMode === 'dark') {
      lightLink.disabled = true;
      darkLink.disabled = false;
    } else {
      lightLink.disabled = false;
      darkLink.disabled = true;
    }
    return;
  }

  // Daylight: use github themes
  if (currentMode === 'dark') {
    lightLink.disabled = true;
    darkLink.disabled = false;
  } else {
    lightLink.disabled = false;
    darkLink.disabled = true;
  }
}

// Theme picker clicks
document.getElementById('theme-picker').addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-pick]');
  if (!btn) return;
  currentTheme = btn.dataset.pick;
  applyThemeMode();
  // Re-render since brutalist uses different card layout
  expandedCards.clear();
  renderResults();
  renderCategories();
});

// Mode toggle
document.getElementById('mode-toggle').addEventListener('click', () => {
  currentMode = currentMode === 'dark' ? 'light' : 'dark';
  applyThemeMode();
});

// ============================================================
// FUZZY SEARCH
// ============================================================

function fuzzyScore(query, text) {
  if (!query || !text) return 0;
  const q = query.toLowerCase();
  const t = text.toLowerCase();

  if (t.includes(q)) return 100;

  const qWords = q.split(/\s+/);
  let wordMatches = 0;
  for (const w of qWords) {
    if (t.includes(w)) wordMatches++;
  }
  if (wordMatches === qWords.length) return 90;
  if (wordMatches > 0) return 40 + (wordMatches / qWords.length) * 40;

  let qi = 0;
  let score = 0;
  let prevMatch = -2;
  for (let ti = 0; ti < t.length && qi < q.length; ti++) {
    if (t[ti] === q[qi]) {
      score += 10;
      if (ti === prevMatch + 1) score += 5;
      if (ti === 0 || t[ti - 1] === ' ' || t[ti - 1] === '_' || t[ti - 1] === '/' || t[ti - 1] === '.') score += 8;
      prevMatch = ti;
      qi++;
    }
  }
  return qi === q.length ? score : 0;
}

function scoreScript(script, query) {
  if (!query) return 50;

  const weights = {
    name: 3.0,
    keywords: 2.5,
    purpose: 2.0,
    category: 1.5,
    file: 1.2,
    syntax: 1.0,
    examples: 0.8,
    parameters: 0.5,
  };

  let total = 0;
  for (const [field, weight] of Object.entries(weights)) {
    const val = script[field] || '';
    total += fuzzyScore(query, val) * weight;
  }

  if (script.documented) total += 5;
  return total;
}

// ============================================================
// STATE
// ============================================================

let allScripts = typeof SCRIPTS_DATA !== 'undefined' ? SCRIPTS_DATA : [];
let activeCategory = null;
let currentSort = 'relevance';
let currentQuery = '';
let expandedCards = new Set();

// ============================================================
// CATEGORIES
// ============================================================

function getCategories() {
  const counts = {};
  for (const s of allScripts) {
    counts[s.category] = (counts[s.category] || 0) + 1;
  }
  return Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .map(([name, count]) => ({ name, count }));
}

function renderCategories() {
  const cats = getCategories();
  const sidebar = document.getElementById('cat-list');
  const mobileCats = document.getElementById('mobile-cats');

  let html = '';
  let mobileHtml = '';

  if (currentTheme === 'daylight') {
    html += `<div class="cat-item ${!activeCategory ? 'active' : ''}" data-cat="">
      <span>All Scripts</span><span class="cat-count">${allScripts.length}</span>
      <span class="cat-tooltip">${allScripts.length} scripts</span>
    </div>`;
    for (const cat of cats) {
      const active = activeCategory === cat.name ? 'active' : '';
      html += `<div class="cat-item ${active}" data-cat="${esc(cat.name)}">
        <span>${esc(cat.name)}</span><span class="cat-count">${cat.count}</span>
        <span class="cat-tooltip">${cat.count} scripts</span>
      </div>`;
    }
  } else {
    html += `<div class="cat-item ${!activeCategory ? 'active' : ''}" data-cat="">
      <span>All Scripts</span><span class="cat-count">${currentTheme === 'brutalist' ? '(' + allScripts.length + ')' : allScripts.length}</span>
    </div>`;
    for (const cat of cats) {
      const active = activeCategory === cat.name ? 'active' : '';
      html += `<div class="cat-item ${active}" data-cat="${esc(cat.name)}">
        <span>${esc(cat.name)}</span><span class="cat-count">${currentTheme === 'brutalist' ? '(' + cat.count + ')' : cat.count}</span>
      </div>`;
    }
  }

  mobileHtml += `<span class="mob-cat ${!activeCategory ? 'active' : ''}" data-cat="">All</span>`;
  for (const cat of cats) {
    const active = activeCategory === cat.name ? 'active' : '';
    mobileHtml += `<span class="mob-cat ${active}" data-cat="${esc(cat.name)}">${esc(cat.name)} (${cat.count})</span>`;
  }

  sidebar.innerHTML = html;
  mobileCats.innerHTML = mobileHtml;

  sidebar.querySelectorAll('.cat-item').forEach(el => {
    el.addEventListener('click', () => {
      activeCategory = el.dataset.cat || null;
      renderCategories();
      renderResults();
    });
  });

  mobileCats.querySelectorAll('.mob-cat').forEach(el => {
    el.addEventListener('click', () => {
      activeCategory = el.dataset.cat || null;
      renderCategories();
      renderResults();
    });
  });
}

// ============================================================
// FILTERING & SORTING
// ============================================================

function getFilteredScripts() {
  let scripts = allScripts;

  if (activeCategory) {
    scripts = scripts.filter(s => s.category === activeCategory);
  }

  if (currentQuery) {
    scripts = scripts.map(s => ({
      ...s,
      _score: scoreScript(s, currentQuery)
    })).filter(s => s._score > 0);
  } else {
    scripts = scripts.map(s => ({ ...s, _score: 50 }));
  }

  switch (currentSort) {
    case 'relevance':
      scripts.sort((a, b) => b._score - a._score || a.name.localeCompare(b.name));
      break;
    case 'name':
      scripts.sort((a, b) => a.name.localeCompare(b.name));
      break;
    case 'category':
      scripts.sort((a, b) => a.category.localeCompare(b.category) || a.name.localeCompare(b.name));
      break;
    case 'documented':
      scripts.sort((a, b) => (b.documented ? 1 : 0) - (a.documented ? 1 : 0) || a.name.localeCompare(b.name));
      break;
  }

  return scripts;
}

// ============================================================
// RENDERING HELPERS
// ============================================================

function esc(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function highlight(text, query) {
  if (!query || !text) return esc(text || '');
  const escaped = esc(text);
  const words = query.toLowerCase().split(/\s+/).filter(Boolean);
  let result = escaped;
  for (const word of words) {
    const regex = new RegExp(`(${word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    result = result.replace(regex, '<mark>$1</mark>');
  }
  return result;
}

function relevanceClass(score) {
  if (!currentQuery) return '';
  if (score >= 80) return 'relevance-high';
  if (score >= 30) return 'relevance-medium';
  return 'relevance-low';
}

// ============================================================
// RENDER RESULTS
// ============================================================

let renderedCount = 0;
let currentFiltered = [];

function renderResults() {
  currentFiltered = getFilteredScripts();
  renderedCount = 0;

  document.getElementById('shown-count').textContent = currentFiltered.length;
  document.getElementById('total-count').textContent = allScripts.length;

  const info = document.getElementById('results-info');
  if (currentTheme === 'brutalist') {
    if (currentQuery) {
      info.textContent = `${currentFiltered.length} RESULTS FOR "${currentQuery.toUpperCase()}"`;
    } else if (activeCategory) {
      info.textContent = `${currentFiltered.length} SCRIPTS IN ${activeCategory.toUpperCase()}`;
    } else {
      info.textContent = `${currentFiltered.length} SCRIPTS`;
    }
  } else {
    if (currentQuery) {
      info.textContent = `${currentFiltered.length} results for "${currentQuery}"`;
    } else if (activeCategory) {
      info.textContent = `${currentFiltered.length} scripts in ${activeCategory}`;
    } else {
      info.textContent = `${currentFiltered.length} scripts`;
    }
  }

  const container = document.getElementById('results');
  container.innerHTML = '';

  if (currentFiltered.length === 0) {
    if (currentTheme === 'brutalist') {
      container.innerHTML = '<div class="empty">NO SCRIPTS FOUND. TRY DIFFERENT SEARCH.</div>';
    } else {
      container.innerHTML = `<div class="empty">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><path d="M8 11h6"/>
          </svg>
        </div>
        <h3>No scripts found</h3>
        <p>Try a different search term or category</p>
      </div>`;
    }
    return;
  }

  renderBatch(50);

  // Update watermark
  const wm = document.getElementById('watermark');
  if (wm) wm.textContent = allScripts.length;
}

function renderBatch(count) {
  const container = document.getElementById('results');
  const end = Math.min(renderedCount + count, currentFiltered.length);

  for (let i = renderedCount; i < end; i++) {
    const s = currentFiltered[i];

    if (currentTheme === 'brutalist') {
      renderBrutalistCard(container, s, i);
    } else {
      renderStandardCard(container, s, i);
    }
  }

  renderedCount = end;
}

// ---- Brutalist card (table row) ----
function renderBrutalistCard(container, s, index) {
  const expanded = expandedCards.has(s.file);

  const row = document.createElement('div');
  row.className = 'row' + (expanded ? ' expanded' : '');
  row.dataset.file = s.file;
  row.innerHTML = `<div class="row-file">${highlight(s.name, currentQuery)}</div><div class="row-purpose">${highlight(s.purpose || '---', currentQuery)}</div><div class="row-cat">${esc(s.category)}</div><div class="row-doc">${s.documented ? '*' : ''}</div>`;

  const details = document.createElement('div');
  details.className = 'row-details' + (expanded ? ' open' : '');
  details.innerHTML = `
    ${s.file ? `<div class="detail-line"><span class="detail-label">File</span><span class="detail-val">${highlight(s.file, currentQuery)}</span></div>` : ''}
    ${s.syntax ? `<div class="detail-line"><span class="detail-label">Syntax</span><span class="detail-val">${highlight(s.syntax, currentQuery)}</span></div>` : ''}
    ${s.parameters ? `<div class="detail-line"><span class="detail-label">Params</span><span class="detail-val">${highlight(s.parameters, currentQuery)}</span></div>` : ''}
    ${s.examples ? `<div class="detail-line"><span class="detail-label">Examples</span><span class="detail-val">${highlight(s.examples, currentQuery)}</span></div>` : ''}
    ${s.keywords ? `<div class="detail-line"><span class="detail-label">Keywords</span><div class="kw-list">${s.keywords.split(',').map(k => `<span class="kw-tag-brutalist">${highlight(k.trim(), currentQuery)}</span>`).join('')}</div></div>` : ''}
    <button class="view-src-brutalist" data-src="${esc(s.file)}">[VIEW SOURCE]</button>
  `;

  row.addEventListener('click', (e) => {
    if (e.target.closest('.view-src-brutalist')) {
      e.stopPropagation();
      openCodeViewer(s.file);
      return;
    }
    if (expandedCards.has(s.file)) {
      expandedCards.delete(s.file);
      row.classList.remove('expanded');
      details.classList.remove('open');
    } else {
      expandedCards.add(s.file);
      row.classList.add('expanded');
      details.classList.add('open');
    }
  });

  details.addEventListener('click', (e) => {
    if (e.target.closest('.view-src-brutalist')) {
      e.stopPropagation();
      openCodeViewer(s.file);
    }
  });

  container.appendChild(row);
  container.appendChild(details);
}

// ---- Standard card (Copper + Daylight) ----
function renderStandardCard(container, s, index) {
  const expanded = expandedCards.has(s.file);
  const div = document.createElement('div');
  div.className = `card${expanded ? ' expanded' : ''}`;
  div.dataset.file = s.file;

  if (currentTheme === 'copper') {
    div.style.animationDelay = `${(index - renderedCount) * 15}ms`;
  }

  const relClass = relevanceClass(s._score);

  // View Source button HTML varies by theme
  let viewSrcHtml;
  if (currentTheme === 'daylight') {
    viewSrcHtml = `<button class="view-src-btn" data-src="${esc(s.file)}">
      View Source <span class="arrow">&rarr;</span>
    </button>`;
  } else {
    viewSrcHtml = `<button class="view-src-btn" data-src="${esc(s.file)}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      View Source
    </button>`;
  }

  div.innerHTML = `
    <div class="card-top">
      ${currentQuery && relClass ? `<div class="relevance-dot ${relClass}" title="Score: ${Math.round(s._score)}"></div>` : ''}
      <span class="card-name">${highlight(s.name, currentQuery)}</span>
      <span class="card-purpose">${highlight(s.purpose || 'No description available', currentQuery)}</span>
      <div class="card-badges">
        <span class="badge cat">${esc(s.category)}</span>
        ${s.documented ? '<span class="badge doc">Documented</span>' : ''}
        ${s.directory && s.directory !== 'root' ? `<span class="badge dir">${esc(s.directory)}/</span>` : ''}
      </div>
    </div>
    <div class="card-details">
      ${s.file ? `<div class="detail-row"><span class="detail-label">File</span><span class="detail-val">${highlight(s.file, currentQuery)}</span></div>` : ''}
      ${s.syntax ? `<div class="detail-row"><span class="detail-label">Syntax</span><span class="detail-val">${highlight(s.syntax, currentQuery)}</span></div>` : ''}
      ${s.parameters ? `<div class="detail-row"><span class="detail-label">Params</span><span class="detail-val">${highlight(s.parameters, currentQuery)}</span></div>` : ''}
      ${s.examples ? `<div class="detail-row"><span class="detail-label">Examples</span><span class="detail-val">${highlight(s.examples, currentQuery)}</span></div>` : ''}
      ${s.keywords ? `<div class="detail-row"><span class="detail-label">Keywords</span><div class="keywords-list">${
        s.keywords.split(',').map(k => `<span class="kw-tag">${highlight(k.trim(), currentQuery)}</span>`).join('')
      }</div></div>` : ''}
      ${viewSrcHtml}
    </div>
  `;

  div.addEventListener('click', (e) => {
    if (e.target.closest('a')) return;
    if (e.target.closest('.view-src-btn')) {
      e.stopPropagation();
      openCodeViewer(s.file);
      return;
    }
    if (expandedCards.has(s.file)) {
      expandedCards.delete(s.file);
      div.classList.remove('expanded');
    } else {
      expandedCards.add(s.file);
      div.classList.add('expanded');
    }
  });

  container.appendChild(div);
}

// ============================================================
// INFINITE SCROLL
// ============================================================

function onScroll() {
  const main = document.querySelector('.main');
  if (main.scrollTop + main.clientHeight >= main.scrollHeight - 300) {
    if (renderedCount < currentFiltered.length) {
      renderBatch(50);
    }
  }

  const btn = document.getElementById('scroll-top');
  if (main.scrollTop > 400) {
    btn.classList.add('visible');
  } else {
    btn.classList.remove('visible');
  }
}

// ============================================================
// EVENT HANDLERS
// ============================================================

const searchInput = document.getElementById('search');
let debounceTimer;

searchInput.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    currentQuery = searchInput.value.trim();
    expandedCards.clear();
    renderResults();
  }, 150);
});

document.addEventListener('keydown', (e) => {
  // Code viewer escape takes highest priority
  if (e.key === 'Escape' && codeOverlay.classList.contains('open')) {
    e.preventDefault();
    e.stopPropagation();
    closeCodeViewer();
    return;
  }
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
  if (e.key === 'Escape') {
    if (searchInput.value) {
      searchInput.value = '';
      currentQuery = '';
      expandedCards.clear();
      renderResults();
    }
    searchInput.blur();
  }
});

document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSort = btn.dataset.sort;
    renderResults();
  });
});

document.querySelector('.main').addEventListener('scroll', onScroll);
document.getElementById('scroll-top').addEventListener('click', () => {
  document.querySelector('.main').scrollTo({ top: 0, behavior: currentTheme === 'brutalist' ? 'auto' : 'smooth' });
});

// ============================================================
// CODE VIEWER
// ============================================================

const codeOverlay = document.getElementById('code-overlay');
const codeBody = document.getElementById('code-body');
const codeTitle = document.getElementById('code-title');
const codeLineCount = document.getElementById('code-line-count');
const codeCopyBtn = document.getElementById('code-copy-btn');
let currentSourceCode = '';

function addLineNumbers(html) {
  const lines = html.split('\n');
  if (lines.length && lines[lines.length - 1].trim() === '') lines.pop();
  return lines.map((line, i) => {
    const num = i + 1;
    return `<tr><td class="hljs-ln-numbers">${num}</td><td>${line}</td></tr>`;
  }).join('\n');
}

async function openCodeViewer(filepath) {
  codeOverlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  if (currentTheme === 'brutalist') {
    codeTitle.textContent = filepath.toUpperCase();
    codeLineCount.textContent = '';
    codeCopyBtn.textContent = 'COPY';
  } else {
    codeTitle.textContent = filepath;
    codeLineCount.textContent = '';
    codeCopyBtn.textContent = 'Copy';
  }

  codeCopyBtn.classList.remove('copied');
  currentSourceCode = '';

  if (currentTheme === 'brutalist') {
    codeBody.innerHTML = '<div class="code-loading">LOADING...</div>';
  } else {
    codeBody.innerHTML = '<div class="code-loading"><div class="spinner"></div>Loading source...</div>';
  }

  try {
    const resp = await fetch(filepath);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const code = await resp.text();
    currentSourceCode = code;

    const lineCount = code.split('\n').length;
    if (currentTheme === 'brutalist') {
      codeLineCount.textContent = `${lineCount} LINES`;
    } else {
      codeLineCount.textContent = `${lineCount} lines`;
    }

    const pre = document.createElement('pre');
    const codeEl = document.createElement('code');
    codeEl.className = 'language-sql';
    codeEl.textContent = code;
    pre.appendChild(codeEl);
    codeBody.innerHTML = '';
    codeBody.appendChild(pre);

    hljs.highlightElement(codeEl);
    codeEl.innerHTML = '<table class="hljs-ln">' + addLineNumbers(codeEl.innerHTML) + '</table>';

  } catch (err) {
    if (currentTheme === 'brutalist') {
      codeBody.innerHTML = `<div class="code-error">COULD NOT LOAD ${esc(filepath).toUpperCase()}<br>SERVE FROM REPOSITORY ROOT.</div>`;
    } else {
      codeBody.innerHTML = `<div class="code-error">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/>
        </svg>
        <p>Could not load <strong>${esc(filepath)}</strong></p>
        <p style="margin-top:4px;color:var(--text2)">Make sure the page is served from the repository root folder.</p>
      </div>`;
    }
  }
}

function closeCodeViewer() {
  codeOverlay.classList.remove('open');
  document.body.style.overflow = '';
  currentSourceCode = '';
}

document.getElementById('code-close-btn').addEventListener('click', closeCodeViewer);
codeOverlay.addEventListener('click', (e) => {
  if (e.target === codeOverlay) closeCodeViewer();
});

codeCopyBtn.addEventListener('click', () => {
  if (!currentSourceCode) return;
  navigator.clipboard.writeText(currentSourceCode).then(() => {
    if (currentTheme === 'brutalist') {
      codeCopyBtn.textContent = 'COPIED';
    } else {
      codeCopyBtn.textContent = 'Copied!';
    }
    codeCopyBtn.classList.add('copied');
    setTimeout(() => {
      if (currentTheme === 'brutalist') {
        codeCopyBtn.textContent = 'COPY';
      } else {
        codeCopyBtn.textContent = 'Copy';
      }
      codeCopyBtn.classList.remove('copied');
    }, 2000);
  });
});

// ============================================================
// INIT
// ============================================================

applyThemeMode();
renderCategories();
renderResults();
</script>
