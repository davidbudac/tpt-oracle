<!DOCTYPE html>
<html lang="en" data-theme="copper" data-mode="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TPT Oracle Scripts Directory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Bureau: Besley (variable slab, reading), Major Mono Display (unusual caps), Fragment Mono -->
<!-- Console: Martian Mono (variable width+weight), Cutive Mono (typewriter warmth) -->
<!-- Atelier: Kalnia (variable serif), Literata (reading serif), Cutive Mono -->
<link href="https://fonts.googleapis.com/css2?family=Besley:ital,wght@0,400..900;1,400..900&family=Cutive+Mono&family=Fragment+Mono:ital@0;1&family=Kalnia:wght@100..700&family=Literata:ital,opsz,wght@0,7..72,300..700;1,7..72,400..600&family=Major+Mono+Display&family=Martian+Mono:wght@200..800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-light" disabled>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css" id="hljs-dark" disabled>
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
* { margin: 0; padding: 0; box-sizing: border-box; }

/* ============================================================
   CSS CUSTOM PROPERTIES PER THEME / MODE
   ============================================================ */

/* ============================================================
   THEME: BUREAU (was Brutalist)
   Engineering bureau / indexed filing cabinet
   Body: Besley (warm variable slab)
   Display: Major Mono Display (unusual caps)
   Mono: Fragment Mono
   ============================================================ */
[data-theme="brutalist"] {
  /* Warm cream paper + deep ink + muted oxblood */
  --bg: oklch(97% 0.012 65);
  --surface: oklch(98% 0.008 65);
  --surface2: oklch(95% 0.015 65);
  --border: oklch(22% 0.015 60);
  --border-light: oklch(85% 0.015 65);
  --text: oklch(20% 0.02 60);
  --text2: oklch(42% 0.02 60);
  --accent: oklch(45% 0.16 28);       /* muted oxblood */
  --accent-bright: oklch(50% 0.18 28);
  --accent-muted: oklch(95% 0.03 28);
  --accent-glow: oklch(90% 0.06 28);
  --green: oklch(45% 0.10 145);
  --green-bg: oklch(95% 0.04 145);
  --orange: oklch(55% 0.12 60);
  --red: oklch(45% 0.16 28);
  --highlight: oklch(90% 0.15 85);    /* paper-yellow marker */
  --hover: oklch(94% 0.012 65);
  --hover-text: oklch(20% 0.02 60);
  --radius: 0px;
  --radius-lg: 0px;
  --radius-pill: 0px;
  --border-width: 1px;
  --transition: 0.15s;
  --font-heading: 'Major Mono Display', monospace;
  --font-body: 'Besley', ui-serif, Georgia, serif;
  --font-mono: 'Fragment Mono', ui-monospace, monospace;
  --sidebar-bg: oklch(95% 0.015 65);
  --sidebar-text: oklch(35% 0.02 60);
  --sidebar-active: oklch(20% 0.02 60);
  --sidebar-active-bg: transparent;
  --sidebar-border: oklch(85% 0.015 65);
  --header-bg: oklch(97% 0.012 65);
  --header-text: oklch(20% 0.02 60);
  --card-bg: transparent;
  --card-border: oklch(80% 0.015 65);
  --code-bg: oklch(20% 0.02 60);
  --code-text: oklch(97% 0.012 65);
  --code-border: oklch(30% 0.02 60);
  --overlay-bg: oklch(20% 0.02 60 / 0.55);
  --backdrop: blur(2px);
  --shadow: none;
  --shadow-hover: none;
}

[data-theme="brutalist"][data-mode="dark"] {
  /* Deep tobacco ink, warm paper type */
  --bg: oklch(16% 0.015 50);
  --surface: oklch(19% 0.015 50);
  --surface2: oklch(22% 0.015 50);
  --border: oklch(30% 0.02 50);
  --border-light: oklch(28% 0.02 50);
  --text: oklch(92% 0.015 70);
  --text2: oklch(65% 0.02 60);
  --accent: oklch(70% 0.14 32);
  --accent-bright: oklch(76% 0.14 32);
  --accent-muted: oklch(25% 0.08 28);
  --accent-glow: oklch(30% 0.10 28);
  --green: oklch(70% 0.12 145);
  --green-bg: oklch(26% 0.06 145);
  --orange: oklch(76% 0.14 60);
  --red: oklch(70% 0.14 28);
  --highlight: oklch(60% 0.18 80);
  --hover: oklch(22% 0.015 50);
  --hover-text: oklch(92% 0.015 70);
  --sidebar-bg: oklch(18% 0.015 50);
  --sidebar-text: oklch(65% 0.02 60);
  --sidebar-active: oklch(92% 0.015 70);
  --sidebar-active-bg: transparent;
  --sidebar-border: oklch(26% 0.02 50);
  --header-bg: oklch(16% 0.015 50);
  --header-text: oklch(92% 0.015 70);
  --card-bg: transparent;
  --card-border: oklch(26% 0.02 50);
  --code-bg: oklch(12% 0.015 50);
  --code-text: oklch(92% 0.015 70);
  --code-border: oklch(26% 0.02 50);
  --overlay-bg: oklch(10% 0.015 50 / 0.75);
}

/* ============================================================
   THEME: CONSOLE (was Copper)
   Professional terminal / Bloomberg-lineage
   All Martian Mono (variable width + weight)
   Graphite + amber (not the overdone orange/copper)
   ============================================================ */
[data-theme="copper"] {
  /* Dark: graphite charcoal + amber */
  --bg: oklch(18% 0.010 260);
  --surface: oklch(21% 0.010 260);
  --surface2: oklch(24% 0.012 260);
  --border: oklch(30% 0.012 260);
  --border-light: oklch(26% 0.012 260);
  --text: oklch(92% 0.008 80);
  --text2: oklch(64% 0.012 260);
  --accent: oklch(76% 0.15 78);       /* amber */
  --accent-bright: oklch(82% 0.17 78);
  --accent-muted: oklch(30% 0.10 78);
  --accent-glow: oklch(35% 0.14 78);
  --green: oklch(72% 0.16 145);
  --green-bg: oklch(28% 0.08 145);
  --orange: oklch(74% 0.17 48);
  --red: oklch(68% 0.18 25);
  --highlight: oklch(60% 0.18 85);
  --hover: oklch(24% 0.012 260);
  --hover-text: oklch(92% 0.008 80);
  --radius: 2px;
  --radius-lg: 2px;
  --radius-pill: 2px;
  --border-width: 1px;
  --transition: 0.1s;
  --font-heading: 'Martian Mono', ui-monospace, monospace;
  --font-body: 'Martian Mono', ui-monospace, monospace;
  --font-mono: 'Martian Mono', ui-monospace, monospace;
  --sidebar-bg: oklch(19% 0.010 260);
  --sidebar-text: oklch(64% 0.012 260);
  --sidebar-active: oklch(82% 0.17 78);
  --sidebar-active-bg: oklch(30% 0.10 78);
  --sidebar-border: oklch(28% 0.012 260);
  --header-bg: oklch(18% 0.010 260);
  --header-text: oklch(92% 0.008 80);
  --card-bg: transparent;
  --card-border: oklch(28% 0.012 260);
  --code-bg: oklch(14% 0.010 260);
  --code-text: oklch(92% 0.008 80);
  --code-border: oklch(26% 0.012 260);
  --overlay-bg: oklch(10% 0.010 260 / 0.8);
  --backdrop: blur(6px);
  --shadow: none;
  --shadow-hover: none;
}

[data-theme="copper"][data-mode="light"] {
  /* Light: paper stock + graphite text + deep amber */
  --bg: oklch(96% 0.008 90);
  --surface: oklch(98% 0.005 90);
  --surface2: oklch(93% 0.010 90);
  --border: oklch(82% 0.012 90);
  --border-light: oklch(88% 0.012 90);
  --text: oklch(22% 0.010 260);
  --text2: oklch(46% 0.012 260);
  --accent: oklch(50% 0.15 58);       /* deep amber on light */
  --accent-bright: oklch(44% 0.17 48);
  --accent-muted: oklch(92% 0.06 70);
  --accent-glow: oklch(88% 0.10 70);
  --green: oklch(42% 0.12 145);
  --green-bg: oklch(94% 0.05 145);
  --orange: oklch(52% 0.15 48);
  --red: oklch(46% 0.16 25);
  --highlight: oklch(88% 0.14 85);
  --hover: oklch(92% 0.010 90);
  --hover-text: oklch(22% 0.010 260);
  --sidebar-bg: oklch(93% 0.010 90);
  --sidebar-text: oklch(46% 0.012 260);
  --sidebar-active: oklch(22% 0.010 260);
  --sidebar-active-bg: oklch(92% 0.06 70);
  --sidebar-border: oklch(85% 0.012 90);
  --header-bg: oklch(96% 0.008 90);
  --header-text: oklch(22% 0.010 260);
  --card-bg: transparent;
  --card-border: oklch(85% 0.012 90);
  --code-bg: oklch(98% 0.005 90);
  --code-text: oklch(22% 0.010 260);
  --code-border: oklch(85% 0.012 90);
  --overlay-bg: oklch(96% 0.008 90 / 0.85);
}

/* ============================================================
   THEME: ATELIER (was Daylight)
   Designer's studio — generous, slightly asymmetric, with personality
   Display: Kalnia (variable modern serif)
   Body: Literata (variable reading serif, Google Fonts)
   Mono: Cutive Mono (warm typewriter)
   Color: bone paper + forest ink + coral accent
   ============================================================ */
[data-theme="daylight"] {
  /* Light: bone paper + deep forest + terracotta coral */
  --bg: oklch(98% 0.008 90);
  --surface: oklch(96% 0.010 90);
  --surface2: oklch(93% 0.012 90);
  --border: oklch(85% 0.012 90);
  --border-light: oklch(92% 0.010 90);
  --text: oklch(28% 0.040 160);       /* deep forest green, not pure black */
  --text2: oklch(50% 0.025 160);
  --accent: oklch(55% 0.155 42);      /* terracotta coral */
  --accent-bright: oklch(60% 0.175 42);
  --accent-muted: oklch(94% 0.05 42);
  --accent-glow: oklch(88% 0.10 42);
  --green: oklch(50% 0.12 145);
  --green-bg: oklch(94% 0.04 145);
  --orange: oklch(58% 0.16 48);
  --red: oklch(50% 0.17 25);
  --highlight: oklch(90% 0.12 85);
  --hover: oklch(95% 0.010 90);
  --hover-text: oklch(28% 0.040 160);
  --radius: 3px;
  --radius-lg: 6px;
  --radius-pill: 3px;
  --border-width: 1px;
  --transition: 0.15s;
  --font-heading: 'Kalnia', ui-serif, Georgia, serif;
  --font-body: 'Literata', ui-serif, Georgia, serif;
  --font-mono: 'Cutive Mono', ui-monospace, monospace;
  --sidebar-bg: transparent;
  --sidebar-text: oklch(50% 0.025 160);
  --sidebar-active: oklch(55% 0.155 42);
  --sidebar-active-bg: transparent;
  --sidebar-border: oklch(90% 0.012 90);
  --header-bg: oklch(98% 0.008 90);
  --header-text: oklch(28% 0.040 160);
  --card-bg: transparent;
  --card-border: oklch(90% 0.010 90);
  --code-bg: oklch(96% 0.010 90);
  --code-text: oklch(28% 0.040 160);
  --code-border: oklch(88% 0.012 90);
  --overlay-bg: oklch(28% 0.040 160 / 0.35);
  --backdrop: blur(3px);
  --shadow: none;
  --shadow-hover: 0 4px 24px oklch(28% 0.04 160 / 0.08);
}

[data-theme="daylight"][data-mode="dark"] {
  /* Dark: deep forest paper + bone type + coral accent */
  --bg: oklch(18% 0.035 160);         /* deep forest green */
  --surface: oklch(21% 0.040 160);
  --surface2: oklch(24% 0.040 160);
  --border: oklch(30% 0.040 160);
  --border-light: oklch(26% 0.040 160);
  --text: oklch(92% 0.015 90);        /* warm bone type */
  --text2: oklch(68% 0.020 160);
  --accent: oklch(72% 0.16 42);       /* brighter coral for contrast */
  --accent-bright: oklch(78% 0.17 42);
  --accent-muted: oklch(32% 0.10 42);
  --accent-glow: oklch(38% 0.13 42);
  --green: oklch(75% 0.14 145);
  --green-bg: oklch(28% 0.08 145);
  --orange: oklch(76% 0.16 48);
  --red: oklch(68% 0.18 25);
  --highlight: oklch(55% 0.16 85);
  --hover: oklch(24% 0.040 160);
  --hover-text: oklch(92% 0.015 90);
  --sidebar-bg: transparent;
  --sidebar-text: oklch(68% 0.020 160);
  --sidebar-active: oklch(72% 0.16 42);
  --sidebar-active-bg: transparent;
  --sidebar-border: oklch(26% 0.040 160);
  --header-bg: oklch(18% 0.035 160);
  --header-text: oklch(92% 0.015 90);
  --card-bg: transparent;
  --card-border: oklch(26% 0.040 160);
  --code-bg: oklch(15% 0.035 160);
  --code-text: oklch(92% 0.015 90);
  --code-border: oklch(26% 0.040 160);
  --overlay-bg: oklch(12% 0.035 160 / 0.75);
  --backdrop: blur(4px);
  --shadow: none;
  --shadow-hover: none;
}

/* ============================================================
   BODY
   ============================================================ */
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background var(--transition), color var(--transition);
}

::selection {
  background: var(--accent);
  color: #ffffff;
}
[data-theme="brutalist"] ::selection {
  background: #ff0000;
  color: #ffffff;
}

/* ============================================================
   HEADER — theme-specific identity
   ============================================================ */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--header-bg);
  border-bottom: 1px solid var(--border-light);
  padding: 18px 36px 16px;
  transition: background var(--transition), border-color var(--transition);
}

.header-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 14px;
  gap: 24px;
}

.header h1 {
  font-family: var(--font-heading);
  font-size: clamp(18px, 2.4vw, 26px);
  font-weight: 400;
  color: var(--header-text);
  letter-spacing: -0.01em;
  line-height: 1.1;
  transition: color var(--transition);
}
.header h1 strong {
  font-weight: 700;
  color: var(--text);
}
.header h1 span {
  font-weight: 400;
  color: var(--text2);
  margin-left: 8px;
  font-size: 0.82em;
}

/* ---- Bureau: roman caps title + author line below ---- */
[data-theme="brutalist"] .header {
  padding: 22px 36px 14px;
  background: var(--header-bg);
  border-bottom: 2px double var(--border);
}
[data-theme="brutalist"] .header h1 {
  font-family: var(--font-heading);  /* Major Mono Display */
  font-size: 18px;
  letter-spacing: 0.08em;
  color: var(--text);
  font-weight: 400;
}
[data-theme="brutalist"] .header h1 strong {
  color: var(--accent);
  font-weight: 400;
}
[data-theme="brutalist"] .header h1 span {
  font-family: var(--font-body);
  font-style: italic;
  font-size: 14px;
  color: var(--text2);
  letter-spacing: 0;
  margin-left: 14px;
}

/* ---- Console: status-bar style header ---- */
[data-theme="copper"] .header {
  padding: 12px 28px 10px;
  border-bottom: 1px solid var(--border);
  background: var(--header-bg);
  font-variant-numeric: tabular-nums;
}
[data-theme="copper"] .header h1 {
  font-family: var(--font-heading);
  font-size: 12px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  font-weight: 700;
  color: var(--accent);
}
[data-theme="copper"] .header h1 strong {
  color: var(--accent-bright);
  font-weight: 700;
}
[data-theme="copper"] .header h1 span {
  color: var(--text2);
  font-size: 12px;
  font-weight: 400;
  text-transform: none;
}

/* ---- Atelier: generous, unusual balance ---- */
[data-theme="daylight"] .header {
  padding: 36px 48px 22px;
  border-bottom: 1px solid var(--border-light);
  background: var(--header-bg);
}
[data-theme="daylight"] .header h1 {
  font-family: var(--font-heading);  /* Kalnia */
  font-size: clamp(26px, 3.5vw, 40px);
  font-weight: 300;
  font-variation-settings: "wght" 350, "wdth" 100;
  letter-spacing: -0.015em;
  color: var(--text);
  line-height: 1.05;
}
[data-theme="daylight"] .header h1 strong {
  font-weight: 600;
  font-variation-settings: "wght" 600, "wdth" 95;
  color: var(--text);
}
[data-theme="daylight"] .header h1 span {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 400;
  color: var(--text2);
  margin-left: 14px;
  letter-spacing: 0;
  vertical-align: middle;
}

.header-subtitle {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--text2);
  margin-top: 6px;
  font-style: italic;
  max-width: 55ch;
  line-height: 1.5;
  display: none;
}
[data-theme="brutalist"] .header-subtitle { display: block; margin-top: 2px; }
[data-theme="daylight"] .header-subtitle {
  display: block;
  font-style: normal;
  font-size: 14px;
  margin-top: 8px;
  color: var(--text2);
}

.header-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

/* Watermark removed — templated pattern */
.header-watermark { display: none !important; }

/* ---- Theme Picker — inline text, not loud buttons ---- */
.theme-picker {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text2);
  padding: 0;
}
.theme-picker::before {
  content: 'theme:';
  opacity: 0.55;
  margin-right: 4px;
}
.theme-picker button {
  background: transparent;
  border: none;
  color: var(--text2);
  font: inherit;
  font-family: inherit;
  font-size: inherit;
  cursor: pointer;
  padding: 2px 4px;
  transition: color var(--transition);
  letter-spacing: 0;
}
.theme-picker button + button::before {
  content: '/';
  color: var(--text2);
  opacity: 0.35;
  margin-right: 3px;
  margin-left: -3px;
}
.theme-picker button:hover { color: var(--text); }
.theme-picker button.active {
  color: var(--accent);
  font-weight: 700;
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-thickness: 1px;
}

/* ---- Mode Toggle — minimal glyph button ---- */
.mode-toggle {
  width: 26px;
  height: 26px;
  border: 1px solid var(--border-light);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  border-radius: var(--radius);
  transition: color var(--transition), border-color var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}
.mode-toggle:hover {
  color: var(--text);
  border-color: var(--border);
}
.mode-toggle svg { width: 14px; height: 14px; }

[data-theme="brutalist"] .mode-toggle {
  border: 1px solid var(--border);
  border-radius: 0;
}

/* ---- Stats ---- */
.stats {
  font-size: 13px;
  color: var(--text2);
  font-weight: 400;
  position: relative;
  white-space: nowrap;
}
.stats b { color: var(--accent); font-weight: 500; }

[data-theme="brutalist"] .stats {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--header-text);
}
[data-theme="brutalist"] .stats b { color: var(--header-text); }

/* ============================================================
   SEARCH
   ============================================================ */
.search-wrap {
  position: relative;
}
[data-theme="brutalist"] .search-wrap {
  border-bottom: var(--border-width) solid var(--border);
  border-top: var(--border-width) solid var(--border);
}

.search-wrap svg {
  position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
  width: 18px; height: 18px; color: var(--text2);
  transition: color var(--transition);
}
[data-theme="brutalist"] .search-wrap svg { display: none; }

/* Default search (overridden per theme below) */
#search {
  width: 100%;
  padding: 10px 18px 10px 42px;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  border-radius: 0;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 16px;
  outline: none;
  transition: border-color var(--transition);
  font-variant-ligatures: common-ligatures;
}
#search::placeholder { color: var(--text2); opacity: 0.6; font-style: italic; }
#search:focus { border-bottom-color: var(--accent); }
.search-wrap svg { opacity: 0.45; }
.search-wrap:focus-within svg { color: var(--accent); opacity: 1; }

/* ---- Bureau: inline query line with leading glyph ---- */
[data-theme="brutalist"] .search-wrap {
  border: none;
  padding: 6px 36px 8px;
}
[data-theme="brutalist"] .search-wrap svg { display: none; }
[data-theme="brutalist"] .search-wrap::before {
  content: '¶';
  position: absolute;
  left: 36px;
  top: 50%;
  transform: translateY(-50%);
  font-family: var(--font-body);
  font-size: 18px;
  color: var(--accent);
  pointer-events: none;
}
[data-theme="brutalist"] #search {
  padding: 8px 0 8px 28px;
  border: none;
  border-bottom: 1px solid var(--border);
  background: transparent;
  font-family: var(--font-body);
  font-size: 17px;
  font-style: italic;
  caret-color: var(--accent);
}
[data-theme="brutalist"] #search::placeholder {
  font-style: italic;
  color: var(--text2);
  opacity: 0.7;
}

/* ---- Console: prompt-like with $ prefix ---- */
[data-theme="copper"] .search-wrap {
  padding: 0 28px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: baseline;
}
[data-theme="copper"] .search-wrap svg { display: none; }
[data-theme="copper"] .search-wrap::before {
  content: 'search:';
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--accent);
  margin-right: 10px;
  padding: 10px 0;
  font-weight: 700;
}
[data-theme="copper"] #search {
  padding: 10px 0;
  border: none;
  background: transparent;
  font-family: var(--font-mono);
  font-size: 13px;
  caret-color: var(--accent);
  font-weight: 400;
}
[data-theme="copper"] #search::placeholder {
  color: var(--text2);
  font-style: normal;
  opacity: 0.55;
}

/* ---- Atelier: sits in the flow, thin bottom rule ---- */
[data-theme="daylight"] .search-wrap {
  padding: 0;
  max-width: 640px;
}
[data-theme="daylight"] .search-wrap svg {
  left: 0;
  width: 16px;
  height: 16px;
  top: 18px;
  transform: none;
  opacity: 0.4;
}
[data-theme="daylight"] #search {
  padding: 14px 0 14px 28px;
  border: none;
  border-bottom: 1px solid var(--border);
  background: transparent;
  font-family: var(--font-heading);
  font-variation-settings: "wght" 400;
  font-size: 22px;
  letter-spacing: -0.01em;
}
[data-theme="daylight"] #search::placeholder {
  font-family: var(--font-heading);
  font-style: italic;
  color: var(--text2);
  opacity: 0.45;
}

.search-hint {
  margin-top: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text2);
  display: flex;
  gap: 22px;
  flex-wrap: wrap;
  opacity: 0.7;
  letter-spacing: 0.01em;
}
[data-theme="brutalist"] .search-hint {
  padding: 0 36px 10px;
  margin-top: 4px;
  font-family: var(--font-body);
  font-style: italic;
  font-size: 12px;
}
[data-theme="daylight"] .search-hint {
  margin-top: 10px;
  opacity: 0.55;
}

.search-hint kbd {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--text2);
  padding: 0;
  background: none;
  border: none;
  border-bottom: 1px dotted var(--text2);
  letter-spacing: 0;
}
[data-theme="copper"] .search-hint kbd { color: var(--accent); border-bottom-color: var(--accent-muted); }
[data-theme="daylight"] .search-hint kbd { border-bottom: none; font-weight: 600; }

/* ============================================================
   LAYOUT
   ============================================================ */
.layout {
  display: flex;
  min-height: calc(100vh - 140px);
}
/* Bureau: tighter page width, like a book */
[data-theme="brutalist"] .layout {
  max-width: 1280px;
  margin: 0 auto;
}
/* Console: full viewport like a terminal */
[data-theme="copper"] .layout {
  max-width: none;
}
/* Atelier: magazine-width, a bit narrower */
[data-theme="daylight"] .layout {
  max-width: 1200px;
  margin: 0 auto;
}

/* ============================================================
   SIDEBAR
   ============================================================ */
.sidebar {
  width: 240px;
  min-width: 240px;
  border-right: 1px solid var(--border-light);
  padding: 22px 0 40px;
  overflow-y: auto;
  position: sticky;
  top: 130px;
  max-height: calc(100vh - 130px);
  background: var(--sidebar-bg);
  transition: background var(--transition), border-color var(--transition);
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border-light); }

/* ---- Bureau: book-style TOC ---- */
[data-theme="brutalist"] .sidebar {
  width: 260px;
  min-width: 260px;
  top: 112px;
  max-height: calc(100vh - 112px);
  padding: 22px 0 40px;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border-light);
}

/* ---- Console: a status-panel-like column ---- */
[data-theme="copper"] .sidebar {
  width: 240px;
  min-width: 240px;
  top: 92px;
  max-height: calc(100vh - 92px);
  padding: 18px 0 40px;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
}

/* ---- Atelier: paper index, narrow rule ---- */
[data-theme="daylight"] .sidebar {
  width: 220px;
  min-width: 220px;
  border-right: none;
  padding: 32px 0 40px 32px;
  top: 160px;
  max-height: calc(100vh - 160px);
  background: transparent;
}

.sidebar h3 {
  font-family: var(--font-mono);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text2);
  padding: 0 20px 10px 28px;
  font-weight: 600;
  opacity: 0.7;
}
[data-theme="brutalist"] .sidebar h3 {
  font-family: var(--font-heading);  /* Major Mono Display */
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.08em;
  padding: 0 20px 14px 28px;
  opacity: 1;
  color: var(--text);
}
[data-theme="daylight"] .sidebar h3 {
  font-family: var(--font-body);
  font-size: 12px;
  text-transform: none;
  letter-spacing: 0;
  font-style: italic;
  font-weight: 400;
  padding-left: 20px;
  opacity: 1;
  color: var(--text2);
}

/* Category items — no side-stripe borders, leading glyph + weight instead */
.cat-item {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: baseline;
  gap: 0.5ch;
  padding: 6px 20px 6px 28px;
  cursor: pointer;
  font-size: 13px;
  color: var(--sidebar-text);
  transition: color var(--transition), background var(--transition);
  position: relative;
  line-height: 1.35;
  font-feature-settings: "tnum";
}
.cat-item:hover {
  color: var(--text);
  background: var(--hover);
}
.cat-item.active {
  color: var(--sidebar-active);
  font-weight: 600;
  background: var(--sidebar-active-bg);
}
.cat-item.active::before {
  content: '›';
  position: absolute;
  left: 14px;
  top: 6px;
  color: var(--accent);
  font-weight: 700;
}

/* ---- Bureau: TOC leaders, indented, with dot fill ---- */
[data-theme="brutalist"] .cat-item {
  padding: 4px 20px 4px 28px;
  font-family: var(--font-body);
  font-size: 13px;
  text-transform: none;
  letter-spacing: 0;
  line-height: 1.4;
  border-bottom: none;
  font-feature-settings: "onum", "tnum";
}
[data-theme="brutalist"] .cat-item > span:first-child {
  position: relative;
  overflow: hidden;
  padding-right: 6px;
}
[data-theme="brutalist"] .cat-item > span:first-child::after {
  content: '';
  position: absolute;
  bottom: 5px;
  left: 0;
  right: 0;
  border-bottom: 1px dotted var(--border-light);
  z-index: -1;
}
[data-theme="brutalist"] .cat-item > span:first-child > span {
  background: var(--sidebar-bg);
  padding-right: 4px;
}
[data-theme="brutalist"] .cat-item:hover {
  background: transparent;
  color: var(--text);
}
[data-theme="brutalist"] .cat-item.active {
  color: var(--accent);
  background: transparent;
  font-weight: 700;
}
[data-theme="brutalist"] .cat-item.active::before {
  content: '§';
  color: var(--accent);
}

/* ---- Console: > prompt marker, inverse active ---- */
[data-theme="copper"] .cat-item {
  font-size: 12px;
  letter-spacing: 0.02em;
  padding: 5px 20px 5px 28px;
}
[data-theme="copper"] .cat-item.active {
  background: var(--accent-muted);
  color: var(--accent-bright);
  font-weight: 700;
}
[data-theme="copper"] .cat-item.active::before {
  content: '>';
  color: var(--accent-bright);
}

/* ---- Atelier: ·  bullet, no heavy background ---- */
[data-theme="daylight"] .cat-item {
  display: grid;
  grid-template-columns: 1fr auto;
  padding: 6px 0 6px 20px;
  margin-left: 0;
  line-height: 1.6;
  font-family: var(--font-body);
  font-size: 14px;
  letter-spacing: -0.005em;
}
[data-theme="daylight"] .cat-item:hover {
  background: transparent;
  color: var(--text);
}
[data-theme="daylight"] .cat-item.active {
  color: var(--accent);
  font-weight: 500;
  background: transparent;
}
[data-theme="daylight"] .cat-item.active::before {
  content: '•';
  position: absolute;
  left: 4px;
  top: 6px;
  color: var(--accent);
  font-weight: 700;
}

/* Count — tabular, unobtrusive */
.cat-count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text2);
  font-variant-numeric: tabular-nums;
  opacity: 0.7;
}
.cat-item.active .cat-count {
  color: var(--accent);
  opacity: 1;
}
[data-theme="brutalist"] .cat-count {
  font-family: var(--font-mono);
  font-size: 11px;
}
[data-theme="daylight"] .cat-count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text2);
  opacity: 0.55;
}

/* ============================================================
   MAIN CONTENT
   ============================================================ */
.main {
  flex: 1;
  padding: 0;
  overflow-y: auto;
  transition: background var(--transition);
  min-width: 0;  /* prevent grid blowout */
}
.main::-webkit-scrollbar { width: 4px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: var(--border-light); }

[data-theme="brutalist"] .main { padding: 0; }
[data-theme="copper"] .main { padding: 0; }
[data-theme="daylight"] .main { padding: 0 32px 60px; }

/* Atelier reading comfort: cap line length on purpose text */
[data-theme="daylight"] .card-purpose { max-width: 72ch; }

/* Global focus ring — not default blue, uses accent */
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
#search:focus-visible { outline: none; }  /* has its own styling */
.card:focus-visible { outline-offset: -2px; }

/* Results header */
.results-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 10px 16px 12px;
  gap: 12px;
  border-bottom: 1px solid var(--border-light);
}

.results-count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text2);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.02em;
}

/* Sort buttons — text links with underline indicator, no chips */
.sort-btns {
  display: flex;
  align-items: baseline;
  gap: 0;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text2);
}
.sort-btns::before {
  content: 'sort:';
  color: var(--text2);
  opacity: 0.55;
  margin-right: 8px;
  font-family: var(--font-mono);
}
.sort-btn {
  background: transparent;
  border: none;
  color: var(--text2);
  padding: 2px 6px;
  border-radius: 0;
  font: inherit;
  font-family: inherit;
  cursor: pointer;
  transition: color var(--transition);
  letter-spacing: 0;
}
.sort-btn + .sort-btn::before {
  content: '/';
  color: var(--text2);
  opacity: 0.35;
  margin-right: 4px;
  margin-left: -2px;
}
.sort-btn:hover { color: var(--text); }
.sort-btn.active {
  color: var(--accent);
  font-weight: 700;
  background: transparent;
  border: none;
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-thickness: 1px;
}

/* Bureau inherits base; Atelier and Console use the same pattern */
[data-theme="brutalist"] .sort-btn.active {
  color: var(--accent);
  font-weight: 700;
}
[data-theme="daylight"] .sort-btns { font-size: 12px; }

/* ============================================================
   CARDS — 2-line dense entries, no side-stripe accents
   ============================================================ */
.card {
  background: var(--card-bg);
  border: none;
  border-bottom: 1px solid var(--border-light);
  border-radius: 0;
  padding: 10px 16px 10px 16px;
  margin: 0;
  cursor: pointer;
  transition: background var(--transition);
  position: relative;
  container-type: inline-size;
}
.card:hover {
  background: var(--hover);
}
.card.expanded {
  background: var(--hover);
}
.card-top {
  display: grid;
  grid-template-columns: minmax(160px, max-content) 1fr auto;
  align-items: baseline;
  gap: 16px;
  min-height: 22px;
}
.card-name {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.005em;
  font-feature-settings: "ss01";
}
.card-purpose {
  font-family: var(--font-body);
  font-size: 13.5px;
  color: var(--text2);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-width: 0;
  line-height: 1.45;
}
.card.expanded .card-purpose { white-space: normal; }
.purpose-generated {
  opacity: 0.75;
  font-style: italic;
}
.purpose-generated::before {
  content: '≈';
  display: inline-block;
  margin-right: 6px;
  opacity: 0.6;
  font-style: normal;
  font-family: var(--font-mono);
}

/* Second-line meta: category · keywords · params · source */
.card-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: baseline;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text2);
  margin-top: 3px;
  line-height: 1.3;
  font-variant-numeric: tabular-nums;
}
.card-meta .meta-cat {
  color: var(--accent);
  font-weight: 600;
}
.card-meta .meta-sep { opacity: 0.35; }
.card-meta .meta-dir {
  color: var(--orange);
  opacity: 0.85;
}
.card-meta .meta-params {
  color: var(--text2);
  opacity: 0.7;
}
.card-meta .meta-gen {
  color: var(--text2);
  font-style: italic;
  opacity: 0.6;
}
.card-meta .meta-doc {
  color: var(--green);
}
.card-meta .meta-kws {
  font-family: var(--font-body);
  font-size: 12px;
  color: var(--text2);
  opacity: 0.75;
}

/* Bureau: no mono for filename, use slab + smallcaps feel */
[data-theme="brutalist"] .card {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border-light);
  display: grid;
  grid-template-columns: 54px 1fr;
  gap: 16px;
  align-items: start;
}
[data-theme="brutalist"] .card::before {
  /* entry number, like a reference index */
  content: attr(data-seq);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text2);
  opacity: 0.6;
  font-variant-numeric: tabular-nums;
  padding-top: 3px;
  text-align: right;
}
[data-theme="brutalist"] .card-top {
  grid-template-columns: minmax(140px, max-content) 1fr;
}
[data-theme="brutalist"] .card-name {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text);
  letter-spacing: 0;
}
[data-theme="brutalist"] .card-purpose {
  font-family: var(--font-body);
  font-size: 14.5px;
  color: var(--text);
  font-weight: 400;
  line-height: 1.5;
}
[data-theme="brutalist"] .card.expanded {
  background: var(--accent-muted);
}
[data-theme="brutalist"] .card-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.02em;
}

/* Console: tighter rows, everything mono */
[data-theme="copper"] .card {
  padding: 7px 16px;
  border-bottom: 1px solid var(--border-light);
}
[data-theme="copper"] .card-top {
  grid-template-columns: minmax(170px, max-content) 1fr auto;
  gap: 18px;
}
[data-theme="copper"] .card-name {
  font-family: var(--font-mono);
  font-size: 12.5px;
  font-weight: 600;
  color: var(--accent-bright);
  letter-spacing: 0;
}
[data-theme="copper"] .card-purpose {
  font-family: var(--font-mono);
  font-size: 12.5px;
  font-weight: 300;
}
[data-theme="copper"] .card-meta {
  font-size: 10.5px;
}

/* Atelier: generous, breathing rows */
[data-theme="daylight"] .card {
  padding: 18px 0 14px;
  border: none;
  border-bottom: 1px solid var(--border-light);
  border-radius: 0;
  margin: 0;
}
[data-theme="daylight"] .card-top {
  display: grid;
  grid-template-columns: minmax(180px, max-content) 1fr;
  align-items: baseline;
  gap: 20px;
}
[data-theme="daylight"] .card-name {
  font-family: var(--font-mono);
  font-size: 13.5px;
  font-weight: 400;
  color: var(--text);
  letter-spacing: 0;
}
[data-theme="daylight"] .card-purpose {
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--text);
  line-height: 1.55;
}
[data-theme="daylight"] .card.expanded { background: transparent; }
[data-theme="daylight"] .card:hover { background: transparent; }
[data-theme="daylight"] .card:hover .card-name { color: var(--accent); }
[data-theme="daylight"] .card-meta {
  font-family: var(--font-mono);
  font-size: 11px;
}

/* Badges in expanded view keep the same style, but simpler */
.card-badges {
  display: none;  /* inline meta line replaces badges */
}
.badge {
  font-size: 11px;
  padding: 2px 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  white-space: nowrap;
  font-family: var(--font-mono);
}
[data-theme="daylight"] .card-name { color: var(--text); font-weight: 600; letter-spacing: -0.01em; }
[data-theme="daylight"] .card-purpose { font-size: 14px; }
[data-theme="daylight"] .badge {
  border: none;
  border-radius: 99px;
  padding: 1px 8px;
  font-weight: 500;
}
[data-theme="daylight"] .badge.cat { background: var(--accent-muted); color: var(--accent); border: none; }
[data-theme="daylight"] .badge.doc { background: var(--green-bg); color: var(--green); border: none; }
[data-theme="daylight"] .badge.gen { background: #f4f4f4; color: #6b7280; border: none; font-style: italic; }
[data-theme="daylight"][data-mode="dark"] .badge.gen { background: #262626; color: #9ca3af; }
[data-theme="daylight"] .badge.dir { background: #fffbeb; color: var(--orange); border: none; }
[data-theme="daylight"][data-mode="dark"] .badge.dir { background: #fbbf2415; }

/* Relevance dots */
.relevance-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px;
}
.relevance-high { background: var(--green); }
.relevance-medium { background: var(--orange); }
.relevance-low { background: var(--red); }
[data-theme="daylight"] .relevance-dot { width: 6px; height: 6px; position: relative; top: -1px; }

/* ============================================================
   EXPANDED DETAILS
   ============================================================ */
.card-details {
  display: none;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}
.card.expanded .card-details { display: block; }
.detail-row {
  display: flex;
  gap: 14px;
  margin-bottom: 10px;
  font-size: 13px;
}
.detail-label {
  color: var(--text2);
  min-width: 78px;
  flex-shrink: 0;
  font-weight: 500;
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.04em;
  padding-top: 3px;
  text-transform: uppercase;
  opacity: 0.7;
}
.detail-val {
  color: var(--text);
  white-space: pre-wrap;
  font-family: var(--font-mono);
  font-size: 12.5px;
  line-height: 1.7;
  font-feature-settings: "ss01";
}
.keywords-list { display: flex; flex-wrap: wrap; gap: 4px; row-gap: 3px; }
.kw-tag {
  font-size: 11px;
  padding: 0 4px;
  border-radius: 0;
  background: transparent;
  border: none;
  border-bottom: 1px dotted var(--border);
  color: var(--text2);
  font-family: var(--font-mono);
  transition: color var(--transition);
}
.kw-tag:hover { color: var(--accent); }

[data-theme="brutalist"] .detail-label {
  font-family: var(--font-body);
  font-style: italic;
  font-weight: 400;
  font-size: 12px;
  text-transform: none;
  letter-spacing: 0;
  color: var(--text2);
  min-width: 86px;
}
[data-theme="brutalist"] .detail-val { font-family: var(--font-mono); }

[data-theme="daylight"] .detail-label {
  font-family: var(--font-mono);
  min-width: 72px;
  font-size: 10.5px;
  letter-spacing: 0.04em;
  padding-top: 2px;
  opacity: 0.6;
}

/* ============================================================
   HIGHLIGHT (mark)
   ============================================================ */
mark {
  background: var(--highlight);
  color: inherit;
  border-radius: 0;
  padding: 0 1px;
  font-weight: 600;
}
[data-theme="brutalist"] mark {
  background: transparent;
  color: var(--accent);
  font-weight: 700;
  text-decoration: underline;
  text-decoration-color: var(--accent);
  text-decoration-thickness: 1px;
  text-underline-offset: 3px;
  padding: 0;
}
[data-theme="copper"] mark {
  background: var(--accent-muted);
  color: var(--accent-bright);
  padding: 0 2px;
}

/* ============================================================
   VIEW SOURCE BUTTON (Copper + Daylight)
   ============================================================ */
.view-src-btn {
  display: inline-flex;
  align-items: baseline;
  gap: 6px;
  background: transparent;
  color: var(--accent);
  border: none;
  border-bottom: 1px dotted currentColor;
  padding: 2px 0 3px;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  margin-top: 14px;
  transition: color var(--transition), border-bottom-color var(--transition);
}
.view-src-btn:hover {

/* ============================================================

   ============================================================ */

/* ============================================================

   ============================================================ */
.scroll-top {

  height: 36px;
  border-radius: 0;

}

}
.scroll-top:hover {

}

/* ============================================================

   ============================================================ */

}

[data-theme="brutalist"] .code-overlay {

.code-copy-btn {

/* Fade animation for copper cards */

<script>
// ============================================================
// THEME + MODE MANAGEMENT
// ============================================================

const THEME_DEFAULTS = {
  brutalist: 'light',
  copper: 'dark',
  daylight: 'light'
};

let currentTheme = localStorage.getItem('tpt-theme') || 'copper';
let currentMode = localStorage.getItem('tpt-mode') || null;

// If no saved mode, use system preference
if (!currentMode) {
  currentMode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

function applyThemeMode() {
  document.documentElement.setAttribute('data-theme', currentTheme);
  document.documentElement.setAttribute('data-mode', currentMode);
  localStorage.setItem('tpt-theme', currentTheme);
  localStorage.setItem('tpt-mode', currentMode);

  // Update theme picker active state
  document.querySelectorAll('#theme-picker button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.pick === currentTheme);
  });

  // Update mode toggle icons
  const sunIcon = document.querySelector('.icon-sun');
  const moonIcon = document.querySelector('.icon-moon');
  if (currentMode === 'dark') {
    sunIcon.style.display = 'block';
    moonIcon.style.display = 'none';
  } else {
    sunIcon.style.display = 'none';
    moonIcon.style.display = 'block';
  }

  // Update highlight.js theme
  updateHljsTheme();
}

function updateHljsTheme() {
  const lightLink = document.getElementById('hljs-light');
  const darkLink = document.getElementById('hljs-dark');

  // Brutalist always uses its own overrides (dark code viewer)
  if (currentTheme === 'brutalist') {
    lightLink.disabled = true;
    darkLink.disabled = true;
    return;
  }

  // Copper uses its own overrides too, but load a base
  if (currentTheme === 'copper') {
    if (currentMode === 'dark') {
      lightLink.disabled = true;
      darkLink.disabled = false;
    } else {
      lightLink.disabled = false;
      darkLink.disabled = true;
    }
    return;
  }

  // Daylight: use github themes
  if (currentMode === 'dark') {
    lightLink.disabled = true;
    darkLink.disabled = false;
  } else {
    lightLink.disabled = false;
    darkLink.disabled = true;
  }
}

// Theme picker clicks
document.getElementById('theme-picker').addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-pick]');
  if (!btn) return;
  currentTheme = btn.dataset.pick;
  applyThemeMode();
  // Re-render since brutalist uses different card layout
  expandedCards.clear();
  renderResults();
  renderCategories();
});

// Mode toggle
document.getElementById('mode-toggle').addEventListener('click', () => {
  currentMode = currentMode === 'dark' ? 'light' : 'dark';
  applyThemeMode();
});

// ============================================================
// FUZZY SEARCH
// ============================================================

function escapeRegex(str) {
  return String(str).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function normalizeText(text) {
  return String(text || '').toLowerCase().trim();
}

function tokenize(text) {
  return normalizeText(text).split(/[^a-z0-9_$./#-]+/).filter(Boolean);
}

function fuzzyScore(query, text, opts = {}) {
  const { allowSubsequence = false } = opts;
  if (!query || !text) return 0;

  const q = normalizeText(query);
  const raw = String(text);
  const t = normalizeText(text);
  if (!q || !t) return 0;

  const qWords = tokenize(q);
  const tWords = tokenize(t);

  if (t === q) return 220;
  if (t.startsWith(q)) return 180;

  const wholePhrase = new RegExp(`\\b${escapeRegex(q)}\\b`, 'i');
  if (wholePhrase.test(raw)) return 160;
  if (t.includes(q)) return 120;

  let exactWords = 0;
  let prefixWords = 0;
  for (const word of qWords) {
    if (tWords.includes(word)) {
      exactWords++;
    } else if (tWords.some(candidate => candidate.startsWith(word))) {
      prefixWords++;
    }
  }

  if (qWords.length > 1) {
    if (exactWords === qWords.length) return 110 + exactWords * 8;
    if (exactWords + prefixWords === qWords.length) return 90 + exactWords * 6 + prefixWords * 4;
  }

  if (exactWords > 0) return 55 + exactWords * 16;
  if (prefixWords > 0) return 35 + prefixWords * 12;

  if (!allowSubsequence || q.length < 5) return 0;

  let qi = 0;
  let score = 0;
  let prevMatch = -2;
  for (let ti = 0; ti < t.length && qi < q.length; ti++) {
    if (t[ti] === q[qi]) {
      score += 10;
      if (ti === prevMatch + 1) score += 5;
      if (ti === 0 || [' ', '_', '/', '.', '-'].includes(t[ti - 1])) score += 8;
      prevMatch = ti;
      qi++;
    }
  }

  return qi === q.length ? Math.min(score, 45) : 0;
}

function minimumScore(query) {
  const words = tokenize(query);
  if (words.length >= 2) return 70;
  if (normalizeText(query).length <= 3) return 60;
  return 35;
}

function scoreScript(script, query) {
  if (!query) return 50;

  const weights = {
    name: { weight: 4.0, allowSubsequence: true },
    file: { weight: 3.2, allowSubsequence: true },
    keywords: { weight: 2.8, allowSubsequence: true },
    category: { weight: 2.0, allowSubsequence: false },
    purpose: { weight: 1.8, allowSubsequence: false },
    syntax: 1.0,
    examples: 0.6,
    parameters: 0.3,
  };

  let total = 0;
  for (const [field, config] of Object.entries(weights)) {
    const val = script[field] || '';
    if (typeof config === 'number') {
      total += fuzzyScore(query, val) * config;
    } else {
      total += fuzzyScore(query, val, { allowSubsequence: config.allowSubsequence }) * config.weight;
    }
  }

  const q = normalizeText(query);
  const baseName = normalizeText((script.name || '').replace(/\.sql$/i, ''));
  const filePath = normalizeText(script.file || '');

  if (baseName === q) total += 45;
  else if (baseName.startsWith(q)) total += 25;

  if (filePath === q || filePath.endsWith('/' + q)) total += 35;
  if (script.documented) total += 8;
  return total;
}

// ============================================================
// STATE
// ============================================================

let allScripts = typeof SCRIPTS_DATA !== 'undefined' ? SCRIPTS_DATA : [];
let activeCategory = null;
let currentSort = 'relevance';
let currentQuery = '';
let expandedCards = new Set();

function readStateFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const nextQuery = params.get('q');
  const nextCategory = params.get('cat');
  const nextSort = params.get('sort');

  if (nextQuery) currentQuery = nextQuery;
  if (nextCategory) activeCategory = nextCategory;
  if (['relevance', 'name', 'category', 'documented'].includes(nextSort)) {
    currentSort = nextSort;
  }
}

function writeStateToUrl() {
  const params = new URLSearchParams();
  if (currentQuery) params.set('q', currentQuery);
  if (activeCategory) params.set('cat', activeCategory);
  if (currentSort !== 'relevance') params.set('sort', currentSort);

  const next = `${window.location.pathname}${params.toString() ? '?' + params.toString() : ''}`;
  window.history.replaceState(null, '', next);
}

// ============================================================
// CATEGORIES
// ============================================================

function getQueryMatchedScripts() {
  if (!currentQuery) {
    return allScripts.map(s => ({ ...s, _score: 50 }));
  }

  const minScore = minimumScore(currentQuery);
  return allScripts
    .map(s => ({ ...s, _score: scoreScript(s, currentQuery) }))
    .filter(s => s._score >= minScore);
}

function getCategories() {
  const source = currentQuery ? getQueryMatchedScripts() : allScripts;
  const counts = {};
  for (const s of source) {
    counts[s.category] = (counts[s.category] || 0) + 1;
  }
  return Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .map(([name, count]) => ({ name, count }));
}

function renderCategories() {
  const cats = getCategories();
  const sidebar = document.getElementById('cat-list');
  const mobileCats = document.getElementById('mobile-cats');

  const allCount = currentQuery ? cats.reduce((sum, cat) => sum + cat.count, 0) : allScripts.length;

  // Inner span wrapping the label allows the "dot leader" effect in Bureau theme
  function item(cat, active) {
    const isAll = cat.name === '__all__';
    const label = isAll ? 'All scripts' : cat.name;
    const count = isAll ? allCount : cat.count;
    return `<div class="cat-item${active ? ' active' : ''}" data-cat="${isAll ? '' : esc(cat.name)}">
      <span><span>${esc(label)}</span></span><span class="cat-count">${count}</span>
    </div>`;
  }

  let html = item({ name: '__all__' }, !activeCategory);
  for (const cat of cats) {
    html += item(cat, activeCategory === cat.name);
  }

  let mobileHtml = `<span class="mob-cat ${!activeCategory ? 'active' : ''}" data-cat="">All</span>`;
  for (const cat of cats) {
    const active = activeCategory === cat.name ? 'active' : '';
    mobileHtml += `<span class="mob-cat ${active}" data-cat="${esc(cat.name)}">${esc(cat.name)} (${cat.count})</span>`;
  }

  sidebar.innerHTML = html;
  mobileCats.innerHTML = mobileHtml;

  sidebar.querySelectorAll('.cat-item').forEach(el => {
    el.addEventListener('click', () => {
      activeCategory = el.dataset.cat || null;
      renderCategories();
      renderResults();
    });
  });

  mobileCats.querySelectorAll('.mob-cat').forEach(el => {
    el.addEventListener('click', () => {
      activeCategory = el.dataset.cat || null;
      renderCategories();
      renderResults();
    });
  });
}

// ============================================================
// FILTERING & SORTING
// ============================================================

function getFilteredScripts() {
  let scripts = getQueryMatchedScripts();

  if (activeCategory) {
    scripts = scripts.filter(s => s.category === activeCategory);
  }

  switch (currentSort) {
    case 'relevance':
      scripts.sort((a, b) => b._score - a._score || a.name.localeCompare(b.name));
      break;
    case 'name':
      scripts.sort((a, b) => a.name.localeCompare(b.name));
      break;
    case 'category':
      scripts.sort((a, b) => a.category.localeCompare(b.category) || a.name.localeCompare(b.name));
      break;
    case 'documented':
      scripts.sort((a, b) => (b.documented ? 1 : 0) - (a.documented ? 1 : 0) || a.name.localeCompare(b.name));
      break;
  }

  return scripts;
}

// ============================================================
// RENDERING HELPERS
// ============================================================

function esc(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function highlight(text, query) {
  if (!query || !text) return esc(text || '');
  const escaped = esc(text);
  const words = query.toLowerCase().split(/\s+/).filter(Boolean);
  let result = escaped;
  for (const word of words) {
    const regex = new RegExp(`(${word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    result = result.replace(regex, '<mark>$1</mark>');
  }
  return result;
}

function relevanceClass(score) {
  if (!currentQuery) return '';
  if (score >= 80) return 'relevance-high';
  if (score >= 30) return 'relevance-medium';
  return 'relevance-low';
}

// ============================================================
// RENDER RESULTS
// ============================================================

let renderedCount = 0;
let currentFiltered = [];

function renderResults() {
  currentFiltered = getFilteredScripts();
  renderedCount = 0;
  const queryMatched = currentQuery ? getQueryMatchedScripts().length : allScripts.length;

  // Format the results info line. Tabular numerals come from CSS.
  const info = document.getElementById('results-info');
  const total = allScripts.length;
  const shown = currentFiltered.length;

  let parts;
  if (currentQuery && activeCategory) {
    parts = `${shown} match "${currentQuery}" in ${activeCategory.toLowerCase()}`;
  } else if (currentQuery) {
    parts = `${shown} of ${total} match "${currentQuery}"`;
  } else if (activeCategory) {
    parts = `${shown} in ${activeCategory.toLowerCase()}`;
  } else {
    parts = `${shown} scripts`;
  }
  info.textContent = parts;

  const container = document.getElementById('results');
  container.innerHTML = '';

  if (currentFiltered.length === 0) {
    if (currentTheme === 'brutalist') {
      container.innerHTML = '<div class="empty">NO SCRIPTS FOUND. TRY DIFFERENT SEARCH.</div>';
    } else {
      container.innerHTML = `<div class="empty">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><path d="M8 11h6"/>
          </svg>
        </div>
        <h3>No scripts found</h3>
        <p>Try a different search term or category</p>
      </div>`;
    }
    return;
  }

  renderBatch(50);
  writeStateToUrl();
}

function renderBatch(count) {
  const container = document.getElementById('results');
  const end = Math.min(renderedCount + count, currentFiltered.length);

  for (let i = renderedCount; i < end; i++) {
    const s = currentFiltered[i];
    renderStandardCard(container, s, i);
  }

  renderedCount = end;
}

// ---- Count params from "&1: name, &2: name" string ----
function paramCount(s) {
  if (!s.parameters) return 0;
  const m = s.parameters.match(/&\d+/g);
  return m ? m.length : 0;
}

// ---- Get top-K keywords for inline display ----
function topKeywords(s, k = 3) {
  if (!s.keywords) return [];
  return s.keywords.split(',').map(w => w.trim()).filter(Boolean).slice(0, k);
}

// ---- Standard card (all 3 themes now — themed via CSS only) ----
function renderStandardCard(container, s, index) {
  const expanded = expandedCards.has(s.file);
  const div = document.createElement('div');
  div.className = `card${expanded ? ' expanded' : ''}`;
  div.dataset.file = s.file;
  div.dataset.seq = String(index + 1).padStart(4, '0');

  if (currentTheme === 'copper') {
    div.style.animationDelay = `${(index - renderedCount) * 15}ms`;
  }

  const relClass = relevanceClass(s._score);
  const pCount = paramCount(s);
  const kws = topKeywords(s, 3);

  // View Source button varies by theme aesthetic
  let viewSrcHtml;
  if (currentTheme === 'daylight') {
    viewSrcHtml = `<button class="view-src-btn" data-src="${esc(s.file)}">Read source <span class="arrow">&rarr;</span></button>`;
  } else if (currentTheme === 'brutalist') {
    viewSrcHtml = `<button class="view-src-btn" data-src="${esc(s.file)}">Open source &#8250;</button>`;
  } else {
    viewSrcHtml = `<button class="view-src-btn" data-src="${esc(s.file)}">$ cat ${esc(s.file)}</button>`;
  }

  // Meta line: category · keywords · params · dir · source
  const metaParts = [];
  metaParts.push(`<span class="meta-cat">${esc(s.category)}</span>`);
  if (kws.length) {
    metaParts.push(`<span class="meta-sep">·</span><span class="meta-kws">${kws.map(k => highlight(k, currentQuery)).join(' ')}</span>`);
  }
  if (pCount > 0) {
    metaParts.push(`<span class="meta-sep">·</span><span class="meta-params" title="${esc(s.parameters)}">${pCount} param${pCount === 1 ? '' : 's'}</span>`);
  }
  if (s.directory && s.directory !== 'root') {
    metaParts.push(`<span class="meta-sep">·</span><span class="meta-dir">${esc(s.directory)}/</span>`);
  }
  if (s.documented) {
    metaParts.push(`<span class="meta-sep">·</span><span class="meta-doc" title="Hand-curated catalog entry">curated</span>`);
  } else if (s.generated) {
    metaParts.push(`<span class="meta-sep">·</span><span class="meta-gen" title="Description synthesized from SQL content">inferred</span>`);
  }

  div.innerHTML = `
    <div class="card-top">
      ${currentQuery && relClass ? `<div class="relevance-dot ${relClass}" title="Match score: ${Math.round(s._score)}"></div>` : ''}
      <span class="card-name">${highlight(s.name, currentQuery)}</span>
      <span class="card-purpose${s.generated ? ' purpose-generated' : ''}">${highlight(s.purpose || 'No description available', currentQuery)}</span>
    </div>
    <div class="card-meta">${metaParts.join(' ')}</div>
    <div class="card-details">
      ${s.file ? `<div class="detail-row"><span class="detail-label">File</span><span class="detail-val">${highlight(s.file, currentQuery)}</span></div>` : ''}
      ${s.syntax ? `<div class="detail-row"><span class="detail-label">Syntax</span><span class="detail-val">${highlight(s.syntax, currentQuery)}</span></div>` : ''}
      ${s.parameters ? `<div class="detail-row"><span class="detail-label">Params</span><span class="detail-val">${highlight(s.parameters, currentQuery)}</span></div>` : ''}
      ${s.examples ? `<div class="detail-row"><span class="detail-label">Examples</span><span class="detail-val">${highlight(s.examples, currentQuery)}</span></div>` : ''}
      ${s.keywords ? `<div class="detail-row"><span class="detail-label">Keywords</span><div class="keywords-list">${
        s.keywords.split(',').map(k => `<span class="kw-tag">${highlight(k.trim(), currentQuery)}</span>`).join('')
      }</div></div>` : ''}
      ${viewSrcHtml}
    </div>
  `;

  div.addEventListener('click', (e) => {
    if (e.target.closest('a')) return;
    if (e.target.closest('.view-src-btn')) {
      e.stopPropagation();
      openCodeViewer(s.file);
      return;
    }
    if (expandedCards.has(s.file)) {
      expandedCards.delete(s.file);
      div.classList.remove('expanded');
    } else {
      expandedCards.add(s.file);
      div.classList.add('expanded');
    }
  });

  container.appendChild(div);
}

// ============================================================
// INFINITE SCROLL
// ============================================================

function onScroll() {
  const main = document.querySelector('.main');
  if (main.scrollTop + main.clientHeight >= main.scrollHeight - 300) {
    if (renderedCount < currentFiltered.length) {
      renderBatch(50);
    }
  }

  const btn = document.getElementById('scroll-top');
  if (main.scrollTop > 400) {
    btn.classList.add('visible');
  } else {
    btn.classList.remove('visible');
  }
}

// ============================================================
// EVENT HANDLERS
// ============================================================

const searchInput = document.getElementById('search');
let debounceTimer;

searchInput.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    currentQuery = searchInput.value.trim();
    expandedCards.clear();
    renderCategories();
    renderResults();
  }, 150);
});

document.addEventListener('keydown', (e) => {
  // Code viewer escape takes highest priority
  if (e.key === 'Escape' && codeOverlay.classList.contains('open')) {
    e.preventDefault();
    e.stopPropagation();
    closeCodeViewer();
    return;
  }
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
  if (e.key === 'Escape') {
    if (searchInput.value) {
      searchInput.value = '';
      currentQuery = '';
      expandedCards.clear();
      renderCategories();
      renderResults();
    }
    searchInput.blur();
  }
});

document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSort = btn.dataset.sort;
    renderResults();
  });
});

document.querySelector('.main').addEventListener('scroll', onScroll);
document.getElementById('scroll-top').addEventListener('click', () => {
  document.querySelector('.main').scrollTo({ top: 0, behavior: currentTheme === 'brutalist' ? 'auto' : 'smooth' });
});

// ============================================================
// CODE VIEWER
// ============================================================

const codeOverlay = document.getElementById('code-overlay');
const codeBody = document.getElementById('code-body');
const codeTitle = document.getElementById('code-title');
const codeLineCount = document.getElementById('code-line-count');
const codeCopyBtn = document.getElementById('code-copy-btn');
let currentSourceCode = '';

function addLineNumbers(html) {
  const lines = html.split('\n');
  if (lines.length && lines[lines.length - 1].trim() === '') lines.pop();
  return lines.map((line, i) => {
    const num = i + 1;
    return `<tr><td class="hljs-ln-numbers">${num}</td><td>${line}</td></tr>`;
  }).join('\n');
}

async function openCodeViewer(filepath) {
  codeOverlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  if (currentTheme === 'brutalist') {
    codeTitle.textContent = filepath.toUpperCase();
    codeLineCount.textContent = '';
    codeCopyBtn.textContent = 'COPY';
  } else {
    codeTitle.textContent = filepath;
    codeLineCount.textContent = '';
    codeCopyBtn.textContent = 'Copy';
  }

  codeCopyBtn.classList.remove('copied');
  currentSourceCode = '';

  if (currentTheme === 'brutalist') {
    codeBody.innerHTML = '<div class="code-loading">LOADING...</div>';
  } else {
    codeBody.innerHTML = '<div class="code-loading"><div class="spinner"></div>Loading source...</div>';
  }

  try {
    const resp = await fetch(filepath);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const code = await resp.text();
    currentSourceCode = code;

    const lineCount = code.split('\n').length;
    if (currentTheme === 'brutalist') {
      codeLineCount.textContent = `${lineCount} LINES`;
    } else {
      codeLineCount.textContent = `${lineCount} lines`;
    }

    const pre = document.createElement('pre');
    const codeEl = document.createElement('code');
    codeEl.className = 'language-sql';
    codeEl.textContent = code;
    pre.appendChild(codeEl);
    codeBody.innerHTML = '';
    codeBody.appendChild(pre);

    hljs.highlightElement(codeEl);
    codeEl.innerHTML = '<table class="hljs-ln">' + addLineNumbers(codeEl.innerHTML) + '</table>';

  } catch (err) {
    if (currentTheme === 'brutalist') {
      codeBody.innerHTML = `<div class="code-error">COULD NOT LOAD ${esc(filepath).toUpperCase()}<br>SERVE FROM REPOSITORY ROOT.</div>`;
    } else {
      codeBody.innerHTML = `<div class="code-error">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/>
        </svg>
        <p>Could not load <strong>${esc(filepath)}</strong></p>
        <p style="margin-top:4px;color:var(--text2)">Make sure the page is served from the repository root folder.</p>
      </div>`;
    }
  }
}

function closeCodeViewer() {
  codeOverlay.classList.remove('open');
  document.body.style.overflow = '';
  currentSourceCode = '';
}

document.getElementById('code-close-btn').addEventListener('click', closeCodeViewer);
codeOverlay.addEventListener('click', (e) => {
  if (e.target === codeOverlay) closeCodeViewer();
});

codeCopyBtn.addEventListener('click', () => {
  if (!currentSourceCode) return;
  navigator.clipboard.writeText(currentSourceCode).then(() => {
    if (currentTheme === 'brutalist') {
      codeCopyBtn.textContent = 'COPIED';
    } else {
      codeCopyBtn.textContent = 'Copied!';
    }
    codeCopyBtn.classList.add('copied');
    setTimeout(() => {
      if (currentTheme === 'brutalist') {
        codeCopyBtn.textContent = 'COPY';
      } else {
        codeCopyBtn.textContent = 'Copy';
      }
      codeCopyBtn.classList.remove('copied');
    }, 2000);
  });
});

// ============================================================
// INIT
// ============================================================

applyThemeMode();
readStateFromUrl();
searchInput.value = currentQuery;
document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.classList.toggle('active', btn.dataset.sort === currentSort);
});
renderCategories();
renderResults();
</script>
